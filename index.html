<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis Life - Life Insurance CRM</title>
</head>
<body>
<style>
  :root {
    --bg: #eef1ef;
    --surface: #ffffff;
    --surface-2: #f6f8f7;
    --border: #dde3e0;
    --border-strong: #c8d1cd;
    --ink: #14201c;
    --ink-2: #4a5a54;
    --ink-3: #7d8b85;
    --sidebar: #132a26;
    --sidebar-ink: #cfe0da;
    --sidebar-ink-2: #7fa099;
    --sidebar-active: #1d3d37;
    --accent: #0d9488;
    --accent-strong: #0b7d73;
    --accent-soft: #d4ede9;
    --shadow: 0 1px 2px rgba(19,42,38,.06), 0 4px 16px rgba(19,42,38,.06);
    --shadow-lg: 0 8px 40px rgba(19,42,38,.16);
    --radius: 10px;
    --radius-sm: 7px;

    --s-new: #64748b;      --s-new-bg: #eef1f5;
    --s-contacted: #0891b2;--s-contacted-bg: #e0f3f8;
    --s-appointment:#7c3aed;--s-appointment-bg:#efe8fd;
    --s-quoted: #d97706;   --s-quoted-bg: #fbeeda;
    --s-application:#0d9488;--s-application-bg:#d4ede9;
    --s-won: #16a34a;      --s-won-bg: #dcf3e3;
    --s-lost: #dc2626;     --s-lost-bg: #fbe2e2;

    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", ui-monospace, "JetBrains Mono", "Roboto Mono", Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1512; --surface: #16211d; --surface-2: #1b2924;
      --border: #263631; --border-strong: #33473f;
      --ink: #e6efeb; --ink-2: #9db3ab; --ink-3: #6e847c;
      --sidebar: #0d1a17; --sidebar-active: #17302b;
      --accent: #19b3a4; --accent-strong: #22c3b3; --accent-soft: #123330;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.5);
      --s-new-bg:#20272e; --s-contacted-bg:#0c2b33; --s-appointment-bg:#241a3a;
      --s-quoted-bg:#33260f; --s-application-bg:#123330; --s-won-bg:#0f2c1a; --s-lost-bg:#331617;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0d1512; --surface: #16211d; --surface-2: #1b2924;
    --border: #263631; --border-strong: #33473f;
    --ink: #e6efeb; --ink-2: #9db3ab; --ink-3: #6e847c;
    --sidebar: #0d1a17; --sidebar-active: #17302b;
    --accent: #19b3a4; --accent-strong: #22c3b3; --accent-soft: #123330;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.3);
    --shadow-lg: 0 8px 40px rgba(0,0,0,.5);
    --s-new-bg:#20272e; --s-contacted-bg:#0c2b33; --s-appointment-bg:#241a3a;
    --s-quoted-bg:#33260f; --s-application-bg:#123330; --s-won-bg:#0f2c1a; --s-lost-bg:#331617;
  }
  :root[data-theme="light"] {
    --bg: #eef1ef; --surface: #ffffff; --surface-2: #f6f8f7;
    --border: #dde3e0; --border-strong: #c8d1cd;
    --ink: #14201c; --ink-2: #4a5a54; --ink-3: #7d8b85;
    --sidebar: #132a26; --sidebar-active: #1d3d37;
    --accent: #0d9488; --accent-strong: #0b7d73; --accent-soft: #d4ede9;
    --s-new-bg:#eef1f5; --s-contacted-bg:#e0f3f8; --s-appointment-bg:#efe8fd;
    --s-quoted-bg:#fbeeda; --s-application-bg:#d4ede9; --s-won-bg:#dcf3e3; --s-lost-bg:#fbe2e2;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  h1,h2,h3 { margin: 0; text-wrap: balance; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  ::selection { background: var(--accent-soft); }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* ---------- shell ---------- */
  .app { display: grid; grid-template-columns: 236px 1fr; min-height: 100vh; }
  .sidebar { background: var(--sidebar); color: var(--sidebar-ink); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 20px 18px 18px; }
  .brand .glyph { width: 30px; height: 30px; flex: none; }
  .brand-name { font-weight: 700; font-size: 16px; letter-spacing: .2px; color: #fff; outline: none; }
  .brand-name:focus { text-decoration: underline dotted var(--sidebar-ink-2); }
  .nav { display: flex; flex-direction: column; gap: 2px; padding: 8px 12px; }
  .nav button { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; background: none; border: 0; color: var(--sidebar-ink); padding: 9px 11px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; }
  .nav button svg { width: 17px; height: 17px; flex: none; opacity: .85; }
  .nav button:hover { background: rgba(255,255,255,.05); }
  .nav button.active { background: var(--sidebar-active); color: #fff; }
  .nav button.active svg { opacity: 1; }
  .nav .count { margin-left: auto; font-size: 11px; font-weight: 600; background: rgba(255,255,255,.1); padding: 1px 7px; border-radius: 20px; font-variant-numeric: tabular-nums; }
  .sidebar-foot { margin-top: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(255,255,255,.07); }
  .sidebar-foot button { background: rgba(255,255,255,.06); color: var(--sidebar-ink); border: 0; border-radius: var(--radius-sm); padding: 8px; font-size: 12.5px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; }
  .sidebar-foot button:hover { background: rgba(255,255,255,.12); }
  .sidebar-foot svg { width: 15px; height: 15px; }

  .main { min-width: 0; display: flex; flex-direction: column; height: 100vh; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 20; }
  .topbar h1 { font-size: 19px; font-weight: 650; }
  .topbar .sub { color: var(--ink-3); font-size: 13px; margin-top: 1px; }
  .spacer { flex: 1; }
  .content { padding: clamp(16px,2.4vw,26px) clamp(16px,3vw,30px) 64px; flex: 1; overflow-y: auto; min-height: 0; }
  .content.cal-content { display: flex; flex-direction: column; padding-bottom: clamp(16px,2.4vw,26px); overflow: hidden; }

  .btn { display: inline-flex; align-items: center; gap: 7px; background: var(--accent); color: #fff; border: 0; padding: 9px 15px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13.5px; box-shadow: var(--shadow); }
  .btn:hover { background: var(--accent-strong); }
  .btn svg { width: 16px; height: 16px; }
  .btn.ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--border-strong); box-shadow: none; }
  .btn.ghost:hover { background: var(--surface-2); border-color: var(--ink-3); }
  .btn.sm { padding: 6px 11px; font-size: 12.5px; }
  .btn.danger { background: var(--s-lost); }
  .btn.danger:hover { filter: brightness(1.08); }

  /* ---------- stat cards ---------- */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 17px; box-shadow: var(--shadow); }
  .stat.clickable { cursor: pointer; transition: border-color .15s, transform .15s; }
  .stat.clickable:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat .label { color: var(--ink-3); font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .stat .val { font-size: 27px; font-weight: 700; margin-top: 7px; font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .stat .val small { font-size: 14px; color: var(--ink-3); font-weight: 600; }

  .panels { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 900px){ .panels { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-head { display: flex; align-items: center; gap: 10px; padding: 15px 18px; border-bottom: 1px solid var(--border); }
  .card-head h3 { font-size: 14.5px; font-weight: 650; }
  .card-body { padding: 6px 8px; }

  /* ---------- table ---------- */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 12px; min-width: 240px; flex: 1; max-width: 380px; }
  .search input { border: 0; background: none; outline: none; color: var(--ink); width: 100%; }
  .search svg { width: 16px; height: 16px; color: var(--ink-3); flex: none; }
  select.filter { background: var(--surface); border: 1px solid var(--border-strong); color: var(--ink); border-radius: var(--radius-sm); padding: 8px 10px; font-weight: 500; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface-2); position: sticky; top: 0; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: 0; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--surface-2); }
  .cell-name { font-weight: 600; }
  .cell-sub { color: var(--ink-3); font-size: 12.5px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-strong); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex: none; }
  .with-avatar { display: flex; align-items: center; gap: 10px; }

  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .empty { text-align: center; padding: 54px 20px; color: var(--ink-3); }
  .empty svg { width: 40px; height: 40px; opacity: .4; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; color: var(--ink-2); margin-bottom: 6px; }

  /* ---------- pipeline ---------- */
  .board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; }
  .col { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); width: 264px; flex: none; display: flex; flex-direction: column; max-height: calc(100vh - 190px); }
  .col-head { display: flex; align-items: center; gap: 8px; padding: 12px 13px; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  .col-head .name { font-weight: 650; font-size: 13px; }
  .col-head .k { margin-left: auto; font-size: 11.5px; font-weight: 600; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .col-head .stripe { width: 8px; height: 8px; border-radius: 2px; }
  .col-sub { padding: 0 13px 10px; font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; font-weight: 600; }
  .col-body { padding: 10px; display: flex; flex-direction: column; gap: 9px; overflow-y: auto; flex: 1; min-height: 60px; }
  .col-body.drag-over { background: var(--accent-soft); border-radius: var(--radius-sm); }
  .lead-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; box-shadow: var(--shadow); cursor: grab; }
  .lead-card:active { cursor: grabbing; }
  .lead-card.dragging { opacity: .4; }
  .lead-card .lc-name { font-weight: 650; font-size: 13.5px; }
  .lead-card .lc-meta { color: var(--ink-3); font-size: 12px; margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .lead-card .lc-money { font-family: var(--mono); font-weight: 600; color: var(--accent-strong); font-size: 12.5px; }
  .lc-foot { display: flex; align-items: center; gap: 6px; margin-top: 9px; }
  .tag { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-2); }

  /* ---------- calendar ---------- */
  .cal-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .cal-head h2 { font-size: 18px; font-weight: 650; min-width: 190px; }
  .cal-nav { display: flex; gap: 6px; }
  .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink); display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-btn svg { width: 17px; height: 17px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .cal-dow { background: var(--surface-2); padding: 9px; text-align: center; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); }
  .cal-cell { background: var(--surface); min-height: 108px; padding: 7px 8px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
  .cal-cell:hover { background: var(--surface-2); }
  .cal-cell.other { background: var(--surface-2); }
  .cal-cell.other .cal-date { color: var(--ink-3); opacity: .5; }
  .cal-date { font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums; align-self: flex-start; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .cal-cell.today .cal-date { background: var(--accent); color: #fff; }
  .cal-evt { font-size: 11px; font-weight: 600; padding: 3px 6px; border-radius: 5px; background: var(--s-appointment-bg); color: var(--s-appointment); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-evt .t { font-variant-numeric: tabular-nums; opacity: .8; }

  /* ---------- week (time-grid) calendar ---------- */
  .cal-toggle { display: inline-flex; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); overflow: hidden; }
  .cal-toggle button { background: var(--surface); color: var(--ink-2); border: 0; padding: 7px 15px; font-weight: 600; font-size: 13px; }
  .cal-toggle button:hover { background: var(--surface-2); }
  .cal-toggle button.on { background: var(--accent); color: #fff; }
  .cal-view { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .wk-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; flex: 1; min-height: 0; }
  .wk-now { position: absolute; left: 0; right: 0; height: 0; border-top: 2px solid var(--s-lost); z-index: 4; pointer-events: none; }
  .wk-now::before { content: ''; position: absolute; left: -4px; top: -5px; width: 9px; height: 9px; border-radius: 50%; background: var(--s-lost); }
  .wk-inner { min-width: 760px; }
  .wk-headrow { display: grid; grid-template-columns: 58px repeat(7, minmax(0,1fr)); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 3; }
  .wk-dayhead { text-align: center; padding: 9px 4px; border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .wk-dayhead .wk-dow { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); }
  .wk-dayhead .wk-dnum { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .wk-dayhead.today .wk-dnum { background: var(--accent); color: #fff; border-radius: 50%; }
  .wk-body { display: grid; grid-template-columns: 58px repeat(7, minmax(0,1fr)); }
  .wk-gutter { position: relative; }
  .wk-hour { position: absolute; right: 7px; transform: translateY(-7px); font-size: 10.5px; color: var(--ink-3); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .wk-col { position: relative; border-left: 1px solid var(--border); }
  .wk-col.today { background: var(--accent-soft); }
  .wk-line { position: absolute; left: 0; right: 0; height: 0; border-top: 1px solid var(--border); }
  .wk-evt { position: absolute; background: var(--s-appointment-bg); border: 1px solid var(--s-appointment); border-left: 3px solid var(--s-appointment); border-radius: 5px; padding: 3px 7px; overflow: hidden; cursor: pointer; box-sizing: border-box; }
  .wk-evt:hover { box-shadow: var(--shadow); z-index: 5; filter: brightness(1.04); }
  .wk-evt-t { font-size: 10px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--s-appointment); }
  .wk-evt-title { font-size: 12px; font-weight: 650; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wk-evt-sub { font-size: 10.5px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- import ---------- */
  .import-shell { max-width: 1120px; margin: 0 auto; }
  .import-progress { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .import-progress-item { display: flex; align-items: center; gap: 9px; color: var(--ink-3); font-size: 12.5px; font-weight: 650; padding: 0 4px 11px; border-bottom: 2px solid var(--border); }
  .import-progress-item.on { color: var(--accent-strong); border-color: var(--accent); }
  .import-progress-item.done { color: var(--ink-2); border-color: var(--s-won); }
  .progress-check { width: 20px; height: 20px; border: 1px solid var(--border-strong); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; flex: none; }
  .import-progress-item.on .progress-check { color: #fff; border-color: var(--accent); background: var(--accent); }
  .import-progress-item.done .progress-check { color: #fff; border-color: var(--s-won); background: var(--s-won); }
  .import-step { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 24px; margin-bottom: 18px; }
  .import-step h3 { font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; }
  .step-n { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: none; }
  .import-step p.hint { color: var(--ink-3); font-size: 13px; margin: 2px 0 14px 31px; }
  .import-source-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .drop-zone { min-height: 190px; border: 1.5px dashed var(--border-strong); border-radius: 11px; background: var(--surface-2); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; cursor: pointer; transition: border-color .15s, background .15s, transform .15s; }
  .drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
  .drop-zone svg { width: 30px; height: 30px; color: var(--accent); margin-bottom: 11px; }
  .drop-zone strong { font-size: 14px; }
  .drop-zone span { color: var(--ink-3); font-size: 12.5px; margin-top: 4px; }
  .drop-zone .file-loaded { color: var(--accent-strong); font-weight: 650; overflow-wrap: anywhere; }
  .paste-panel { position: relative; display: flex; flex-direction: column; }
  .paste-panel-label { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--ink-3); font-weight: 650; margin: 0 2px 7px; }
  textarea.paste { width: 100%; min-height: 190px; flex: 1; border: 1px solid var(--border-strong); border-radius: 11px; padding: 13px; background: var(--surface-2); color: var(--ink); font-family: var(--mono); font-size: 12.5px; resize: vertical; outline: none; }
  textarea.paste:focus { border-color: var(--accent); }
  .import-actions { margin-top: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .import-meta { margin-left: auto; color: var(--ink-3); font-size: 12px; }
  .map-overview { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin: 14px 0 16px; }
  .map-stat { border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; background: var(--surface-2); }
  .map-stat b { display: block; font-size: 20px; line-height: 1.15; font-variant-numeric: tabular-nums; }
  .map-stat span { color: var(--ink-3); font-size: 11.5px; }
  .map-table { width: 100%; border-collapse: collapse; }
  .map-table td, .map-table th { padding: 9px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
  .map-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--ink-3); }
  .map-table .src { font-family: var(--mono); font-size: 12px; }
  .map-table select { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 6px; padding: 6px 8px; color: var(--ink); min-width: 190px; }
  .map-table .sample { color: var(--ink-3); font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .import-summary { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-2); margin-bottom: 14px; }
  .import-summary-icon { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-strong); display: flex; align-items: center; justify-content: center; font-weight: 800; flex: none; }

  /* ---------- drawer ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(19,42,38,.4); backdrop-filter: blur(2px); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: min(940px, 96vw); max-width: 96vw; background: var(--surface); box-shadow: var(--shadow-lg); z-index: 51; transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .drawer.open { transform: translateX(0); }
  .drawer-head { padding: 20px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 13px; }
  .drawer-head .avatar { width: 44px; height: 44px; font-size: 16px; }
  .drawer-head h2 { font-size: 18px; font-weight: 650; }
  .drawer-head .close { margin-left: auto; background: none; border: 0; color: var(--ink-3); font-size: 24px; line-height: 1; padding: 0 4px; }
  .drawer-head .close:hover { color: var(--ink); }
  .drawer-body { overflow-y: auto; flex: 1; padding: 20px 22px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }

  .field input, .field select, .field textarea { border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 10px; background: var(--surface-2); color: var(--ink); outline: none; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: var(--surface); }
  .address-autocomplete-field { position:relative; }
  .address-label-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .address-powered { color:var(--accent-strong); font-size:9px; font-weight:800; letter-spacing:.45px; text-transform:uppercase; }
  .address-suggestions { display:none; position:absolute; z-index:80; top:100%; left:0; right:0; margin-top:5px; padding:6px; border:1px solid var(--border-strong); border-radius:11px; background:var(--surface); box-shadow:0 18px 45px rgba(10,25,20,.2); }
  .address-suggestions.open { display:block; }
  .address-suggestion { display:flex; align-items:flex-start; gap:9px; width:100%; padding:10px 11px; border-radius:8px; background:transparent; color:var(--ink); text-align:left; font-size:12.5px; line-height:1.35; }
  .address-suggestion:hover, .address-suggestion:focus { background:var(--accent-soft); outline:none; }
  .address-suggestion-pin { color:var(--accent); font-size:14px; line-height:1.2; }
  .address-status { display:none; margin-top:4px; color:var(--ink-3); font-size:10.5px; }
  .address-status.show { display:block; }
  .drawer-section { margin-top: 24px; }
  .drawer-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .drawer-section h4::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .tl-item { display: flex; gap: 11px; }
  .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex: none; position: relative; }
  .tl-item:not(:last-child) .tl-dot::after { content: ""; position: absolute; top: 12px; left: 4px; width: 1px; height: calc(100% + 8px); background: var(--border); }
  .tl-body { flex: 1; }
  .tl-text { font-size: 13px; }
  .tl-time { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
  .note-add { display: flex; gap: 8px; margin-bottom: 16px; }
  .note-add input { flex: 1; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 11px; background: var(--surface-2); color: var(--ink); outline: none; }
  .note-add input:focus { border-color: var(--accent); }
  .drawer-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .stage-select-wrap { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; padding: 4px 22px 15px; border-bottom: 1px solid var(--border); }
  .stage-btn { border: 1px solid var(--border-strong); background: var(--surface); padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--ink-2); }
  .stage-btn:hover { border-color: var(--ink-3); }
  .stage-btn.on { color: #fff; border-color: transparent; }

  .qbar { display: flex; gap: 8px; padding: 14px 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .qbtn { flex: 1; min-width: 74px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; text-decoration: none; background: var(--surface-2); border: 1px solid var(--border-strong); color: var(--ink); padding: 9px 10px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13px; }
  .qbtn:hover { border-color: var(--ink-3); background: var(--surface); }
  .qbtn svg { width: 16px; height: 16px; }
  .qbtn.accent { background: var(--accent); color: #fff; border-color: transparent; }
  .qbtn.accent:hover { background: var(--accent-strong); }

  .drawer-cols { display: grid; grid-template-columns: 1.18fr .82fr; gap: 4px 28px; }
  .drawer-cols .drawer-section:first-child { margin-top: 0; }
  .dispo-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
  .dispo { border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink-2); border-radius: 20px; padding: 5px 11px; font-size: 12px; font-weight: 600; }
  .dispo:hover { border-color: var(--accent); color: var(--accent-strong); background: var(--accent-soft); }
  .scratch { width: 100%; min-height: 300px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 13px 14px; background: var(--surface-2); color: var(--ink); font-family: inherit; font-size: 15px; line-height: 1.6; resize: vertical; outline: none; }
  .scratch:focus { border-color: var(--accent); background: var(--surface); }
  .autosave-note { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--ink-3); }
  .autosave-note .d { width: 6px; height: 6px; border-radius: 50%; background: var(--s-won); }
  .appt-row { display: flex; align-items: center; gap: 10px; padding: 7px 6px; margin: 0 -6px; cursor: pointer; border-radius: 7px; }
  .appt-row:hover { background: var(--surface-2); }
  .followup-band { display: flex; align-items: center; gap: 10px; padding: 12px 22px; background: var(--surface-2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .followup-band .fu-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
  .followup-band .fu-label svg { width: 15px; height: 15px; color: var(--s-quoted); }
  .followup-band input { border: 1px solid var(--border-strong); border-radius: 7px; padding: 7px 9px; background: var(--surface); color: var(--ink); outline: none; font-size: 13px; }
  .followup-band input:focus { border-color: var(--accent); }
  .followup-band input.fu-note { flex: 1; min-width: 130px; }
  .fu-quick { display: flex; gap: 5px; flex-wrap: wrap; }
  .fu-quick button { border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink-2); border-radius: 20px; padding: 5px 10px; font-size: 11.5px; font-weight: 600; }
  .fu-quick button:hover { border-color: var(--accent); color: var(--accent-strong); }
  .attn-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px; }
  .attn-row:last-child { border-bottom: 0; }
  .attn-row:hover { background: var(--surface-2); }
  .attn-ico { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex: none; font-weight: 700; }
  .attn-ico.fu { background: var(--s-quoted-bg); color: var(--s-quoted); }
  .attn-ico.appt { background: var(--s-appointment-bg); color: var(--s-appointment); }
  .fu-cell { font-variant-numeric: tabular-nums; }
  .fu-cell.overdue { color: var(--s-lost); font-weight: 700; }
  .toggle-btn { background: var(--surface); border: 1px solid var(--border-strong); color: var(--ink-2); border-radius: var(--radius-sm); padding: 8px 12px; font-weight: 600; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; }
  .toggle-btn.on { background: var(--s-quoted-bg); border-color: var(--s-quoted); color: var(--s-quoted); }
  @media (max-width: 700px){
    .drawer-cols { grid-template-columns: 1fr; gap: 0; }
    .drawer { width: 100vw; max-width: 100vw; }
    .field-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ---------- modal ---------- */
  .modal { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal.open { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 460px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .modal-head h3 { font-size: 16px; font-weight: 650; }
  .modal-head .close { margin-left: auto; background: none; border: 0; font-size: 22px; color: var(--ink-3); }
  .modal-body { padding: 20px 22px; }
  .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--surface); padding: 11px 18px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13.5px; box-shadow: var(--shadow-lg); z-index: 80; opacity: 0; transition: all .25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .sync-pill { display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; color:var(--ink-3); white-space:nowrap; }
  .sync-pill .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--ink-3); flex:none; }
  #signOutBtn svg { width:15px; height:15px; }
  .auth-screen { position:fixed; inset:0; z-index:100; background:var(--bg); display:none; align-items:center; justify-content:center; padding:20px; }
  .auth-screen.open { display:flex; }
  .auth-box { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-lg); padding:30px 28px; }
  .auth-brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; color:var(--ink); margin-bottom:20px; }
  .auth-box h2 { font-size:21px; font-weight:650; margin-bottom:5px; }
  .auth-sub { color:var(--ink-3); font-size:13.5px; margin:0 0 20px; }
  .auth-field { display:flex; flex-direction:column; gap:5px; margin-bottom:13px; }
  .auth-field label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-3); }
  .auth-field input { border:1px solid var(--border-strong); border-radius:var(--radius-sm); padding:10px 12px; background:var(--surface-2); color:var(--ink); outline:none; font-size:14px; }
  .auth-field input:focus { border-color:var(--accent); background:var(--surface); }
  .auth-submit { width:100%; justify-content:center; padding:11px; font-size:14.5px; margin-top:6px; }
  .auth-error { display:none; background:var(--s-lost-bg); color:var(--s-lost); font-size:12.5px; font-weight:500; padding:9px 11px; border-radius:var(--radius-sm); margin-bottom:12px; line-height:1.45; }
  .auth-toggle { text-align:center; font-size:13px; color:var(--ink-3); margin-top:16px; }
  .auth-toggle a { color:var(--accent); font-weight:600; text-decoration:none; }

  .hidden { display: none !important; }

  /* ---------- 2026 workspace redesign ---------- */
  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface-2: #f8f7f4;
    --border: #e6e3dc;
    --border-strong: #d5d0c7;
    --ink: #18201d;
    --ink-2: #56605b;
    --ink-3: #89908c;
    --sidebar: #15231f;
    --sidebar-active: #263b35;
    --accent: #176b57;
    --accent-strong: #105441;
    --accent-soft: #e1efe9;
    --shadow: 0 1px 2px rgba(24,32,29,.04), 0 8px 24px rgba(24,32,29,.045);
    --shadow-lg: 0 24px 80px rgba(17,28,24,.20);
    --radius: 14px;
    --radius-sm: 9px;
    --cal-grid-line: #e8e5df;
    --cal-grid-soft: #f0eee9;
    --cal-event-bg: #dceee7;
    --cal-event-border: #25836c;
    --cal-event-ink: #123f34;
    --cal-today: rgba(23,107,87,.055);
    --note-bg: #fffdfa;
  }
  :root[data-theme="light"] {
    --bg: #f4f3ef; --surface: #fff; --surface-2: #f8f7f4;
    --border: #e6e3dc; --border-strong: #d5d0c7;
    --ink: #18201d; --ink-2: #56605b; --ink-3: #89908c;
    --sidebar: #15231f; --sidebar-active: #263b35;
    --accent: #176b57; --accent-strong: #105441; --accent-soft: #e1efe9;
  }
  :root[data-theme="dark"] {
    --bg: #09110f;
    --surface: #111b18;
    --surface-2: #17231f;
    --border: #26352f;
    --border-strong: #34473f;
    --ink: #edf5f1;
    --ink-2: #b2c2bb;
    --ink-3: #7f938a;
    --sidebar: #07100e;
    --sidebar-active: #17362d;
    --accent: #28b892;
    --accent-strong: #55d2b1;
    --accent-soft: #15372e;
    --shadow: 0 1px 2px rgba(0,0,0,.24), 0 12px 32px rgba(0,0,0,.16);
    --cal-grid-line: #30433b;
    --cal-grid-soft: #23342d;
    --cal-event-bg: #164b3e;
    --cal-event-border: #42d2ab;
    --cal-event-ink: #eafff8;
    --cal-today: rgba(40,184,146,.08);
    --note-bg: #111c18;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #09110f; --surface: #111b18; --surface-2: #17231f;
      --border: #26352f; --border-strong: #34473f;
      --ink: #edf5f1; --ink-2: #b2c2bb; --ink-3: #7f938a;
      --sidebar: #07100e; --sidebar-active: #17362d;
      --accent: #28b892; --accent-strong: #55d2b1; --accent-soft: #15372e;
      --cal-grid-line: #30433b; --cal-grid-soft: #23342d;
      --cal-event-bg: #164b3e; --cal-event-border: #42d2ab; --cal-event-ink: #eafff8;
      --cal-today: rgba(40,184,146,.08); --note-bg: #111c18;
    }
  }
  body { letter-spacing: -.005em; }
  .app { grid-template-columns: 248px 1fr; }
  .sidebar { border-right: 1px solid rgba(255,255,255,.04); }
  .brand { padding: 24px 20px 22px; }
  .brand-name { font-size: 17px; letter-spacing: -.2px; }
  .nav { padding: 8px 14px; gap: 4px; }
  .nav button { padding: 11px 12px; border-radius: 10px; }
  .nav button.active { box-shadow: inset 0 0 0 1px rgba(255,255,255,.05); }
  .topbar { min-height: 78px; padding: 17px 32px; }
  .topbar h1 { font-size: 22px; letter-spacing: -.45px; }

  .content { padding: 28px 32px 72px; }

  .btn:hover { transform: translateY(-1px); }
  .btn.sm { min-height: 32px; }
  .card, .stat, .table-wrap, .col { box-shadow: var(--shadow); }

  th { padding: 13px 17px; }
  td { padding: 14px 17px; }
  tbody tr { transition: background .12s; }
  .avatar { width: 34px; height: 34px; }

  /* Dashboard revenue command center. */
  .revenue-hero { position: relative; isolation: isolate; overflow: hidden; display: grid; grid-template-columns: minmax(320px,1.15fr) minmax(420px,.85fr); gap: 24px; padding: 28px 30px; margin-bottom: 18px; border: 1px solid color-mix(in srgb,var(--accent) 45%,var(--border)); border-radius: 18px; background: linear-gradient(125deg,#0b211b 0%,#103a2e 58%,#0b241d 100%); color: #effff9; box-shadow: 0 18px 55px rgba(11,69,53,.22), inset 0 1px 0 rgba(255,255,255,.06); }
  .revenue-hero::before { content:""; position:absolute; width:420px; height:420px; right:-120px; top:-210px; border-radius:50%; background:rgba(49,232,177,.16); filter:blur(26px); z-index:-1; }
  .revenue-hero::after { content:""; position:absolute; width:260px; height:260px; left:18%; bottom:-220px; border-radius:50%; background:rgba(38,204,157,.14); filter:blur(30px); z-index:-1; }
  .revenue-kicker { display:flex; align-items:center; gap:8px; color:#8ee9cc; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.05px; }
  .revenue-kicker::before { content:""; width:8px; height:8px; border-radius:50%; background:#43e3b3; box-shadow:0 0 0 5px rgba(67,227,179,.10),0 0 18px rgba(67,227,179,.7); }
  .revenue-value { margin:8px 0 4px; font-size:clamp(42px,5vw,68px); line-height:1; letter-spacing:-3.5px; font-weight:780; text-shadow:0 0 34px rgba(70,235,183,.28); font-variant-numeric:tabular-nums; }
  .revenue-value sup { color:#66e6bf; font-size:.42em; letter-spacing:0; vertical-align:top; top:.2em; position:relative; margin-right:5px; }
  .revenue-explain { color:#a9c9bd; font-size:13px; max-width:520px; }
  .revenue-explain b { color:#d9fff2; }

  .dashboard-stats { grid-template-columns:repeat(4,minmax(0,1fr)); }

  .stats-hero { position:relative; overflow:hidden; padding:28px 30px; margin-bottom:18px; border-radius:18px; color:#effff9; background:linear-gradient(125deg,#101c18,#163d31); border:1px solid rgba(71,218,172,.24); box-shadow:0 18px 52px rgba(7,42,32,.2); }
  .stats-hero::after { content:""; position:absolute; width:320px; height:320px; right:-90px; top:-190px; border-radius:50%; background:rgba(55,226,174,.15); filter:blur(18px); }
  .stats-kicker { color:#8ee9cc; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }

  .stats-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-bottom:20px; }
  .cost-layout { display:grid; grid-template-columns:minmax(320px,.72fr) minmax(480px,1.28fr); gap:18px; align-items:start; }

      // first sign-in for this account: seed the cloud from any local data, else start empty
      state = normalizeState(load());
      await cloudSaveNow();
    }
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
    setSync('saved');
  } catch(e){
    console.warn('Cloud load failed — using local cache.', e.message||e);
    state = normalizeState(load());
    setSync('offline');
  }
}

/* ========================= helpers ========================= */
const $ = sel => document.querySelector(sel);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fullName = l => [l.firstName, l.lastName].filter(Boolean).join(' ').trim() || '(no name)';
const initials = l => ((l.firstName||' ')[0] + (l.lastName||' ')[0]).toUpperCase().trim() || '?';
function fmtPhone(v){
  const d = String(v||'').replace(/\D/g,'');
  const ten = (d.length===11 && d[0]==='1') ? d.slice(1) : d;
  if (ten.length !== 10) return v; // leave anything non-standard alone
  return `(${ten.slice(0,3)}) ${ten.slice(3,6)}-${ten.slice(6)}`;
}
function ageFromDob(v){
  const s = String(v||'').trim(); if (!s) return '';
  let m = /^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/.exec(s);   // MM/DD/YYYY
  let y, mo, day;
  if (m){ mo=+m[1]; day=+m[2]; y=+m[3]; }
  else { m = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(s); if (m){ y=+m[1]; mo=+m[2]; day=+m[3]; } }
  if (!y || y<1900) return '';
  const now = new Date();
  let age = now.getFullYear()-y;
  if (now.getMonth()+1 < mo || (now.getMonth()+1===mo && now.getDate()<day)) age--;
  return (age>0 && age<120) ? String(age) : '';
}
function money(v) {
  if (v == null || v === '') return '';
  const n = Number(String(v).replace(/[^0-9.\-]/g,''));
  if (isNaN(n) || n === 0) return String(v).match(/[0-9]/) ? '$'+Number(String(v).replace(/[^0-9.]/g,'')).toLocaleString() : v;
  return '$' + n.toLocaleString();
}
function relTime(ts){
  const d = (Date.now()-ts)/1000;
  if (d<60) return 'just now';
  if (d<3600) return Math.floor(d/60)+'m ago';
  if (d<86400) return Math.floor(d/3600)+'h ago';
  if (d<604800) return Math.floor(d/86400)+'d ago';
  return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2200);
}
function pill(stageId){
  const s = stageById(stageId);
  return `<span class="pill" style="background:${s.bg};color:${s.color}"><span class="dot" style="background:${s.color}"></span>${s.label}</span>`;
}

function sanitizeRichHtml(html){
  const doc=new DOMParser().parseFromString(`<div>${html||''}</div>`,'text/html');
  const allowed=new Set(['DIV','P','BR','STRONG','B','EM','I','U','S','DEL','SUP','SUB','H1','H2','H3','H4','H5','H6','UL','OL','LI','BLOCKQUOTE','TABLE','THEAD','TBODY','TR','TH','TD','MARK','A','SPAN']);
  [...doc.body.querySelectorAll('*')].forEach(el=>{
    if (!allowed.has(el.tagName)){ el.replaceWith(...el.childNodes); return; }
    [...el.attributes].forEach(attr=>{
      const name=attr.name.toLowerCase();
      if (name==='class'){
        const safe=attr.value.split(/\s+/).filter(c=>/^highlight-[a-z-]+$/.test(c)).join(' ');
        if(safe) el.setAttribute('class',safe); else el.removeAttribute('class');
      } else if(name==='href' && el.tagName==='A'){
        if(!/^https?:\/\//i.test(attr.value) && !/^mailto:/i.test(attr.value)) el.removeAttribute('href');
        else { el.setAttribute('target','_blank'); el.setAttribute('rel','noopener noreferrer'); }
      } else if(name!=='colspan' && name!=='rowspan') el.removeAttribute(attr.name);
    });
  });
  return doc.body.firstElementChild?.innerHTML||'';
}
function personalizeRichScript(html,lead){

let mammothPromise=null;
function loadMammoth(){
  if(window.mammoth) return Promise.resolve(window.mammoth);
  if(mammothPromise) return mammothPromise;
  mammothPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/mammoth@1.12.0/mammoth.browser.min.js';
    s.onload=()=>resolve(window.mammoth); s.onerror=()=>reject(new Error('Word importer could not load'));

/* ========================= calendar ========================= */
let calRef = new Date();
let calMode = 'week';
let _wkMinH = 8, _wkHH = 52, _wkScroll = 7;

function calStartOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
function calFmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function calToMin(t){ const m=/^(\d{1,2}):(\d{2})/.exec(t||''); return m ? (+m[1])*60 + (+m[2]) : 9*60; }
function calFmtHour(h){ const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0) hh=12; return `${hh} ${ap}`; }
function calFmtTime12(t){ const mn=calToMin(t); let h=Math.floor(mn/60), m=mn%60; const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0) hh=12; return `${hh}:${String(m).padStart(2,'0')} ${ap}`; }
function calLayoutDay(appts){
  const evs = appts.map(a=>({ a, start:calToMin(a.time), end:calToMin(a.time)+(Number(a.duration)||30) })).sort((x,y)=> x.start-y.start);
  let cols=[], group=[], groupEnd=-1; const res=[];
  const flush=()=>{ const n=cols.length; group.forEach(e=> res.push({ e, col:e._c, cols:n })); cols=[]; group=[]; };
  evs.forEach(e=>{
    if (group.length && e.start >= groupEnd) flush();
    let placed=false;
    for (let c=0;c<cols.length;c++){ if (cols[c][cols[c].length-1].end <= e.start){ cols[c].push(e); e._c=c; placed=true; break; } }
    if (!placed){ cols.push([e]); e._c=cols.length-1; }
    group.push(e); groupEnd=Math.max(groupEnd, e.end);
  });
  flush();
  return res;
}
function calHeadHtml(title){
  const nextLbl = calMode==='week' ? 'week' : 'month';
  return `
  <div class="cal-head">
    <h2>${title}</h2>
    <div class="cal-nav">

      <button class="icon-btn" id="calToday" style="width:auto;padding:0 12px;font-weight:600;font-size:13px;">Today</button>
      <button class="icon-btn" id="calNext" title="Next ${nextLbl}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="cal-toggle">
      <button class="${calMode==='week'?'on':''}" data-mode="week">Week</button>
      <button class="${calMode==='month'?'on':''}" data-mode="month">Month</button>
    </div>
    <div style="flex:1"></div>
    <button class="btn" id="newApptBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>New appointment</button>
  </div>`;
}
function viewCalendar(){ return calMode==='week' ? viewCalWeek() : viewCalMonth(); }
function calendarAgenda(appts, title){
  const sorted=[...appts].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  return `<aside class="agenda-panel">
    <div class="agenda-head"><small>Up next</small><strong>${esc(title)}</strong></div>
    <div class="agenda-list">${sorted.length ? sorted.map(a=>{
      const l=state.leads.find(x=>x.id===a.leadId);
      const d=new Date(a.date+'T00:00');
      return `<div class="agenda-item" data-agenda-appt="${a.id}">
        <div class="agenda-time">${d.toLocaleDateString(undefined,{weekday:'short'})}<br>${calFmtTime12(a.time)}</div>
        <div><div class="agenda-name">${esc(l?fullName(l):(a.title||'Appointment'))}</div><div class="agenda-title">${esc(l&&a.title?a.title:(a.notes||'Open appointment'))}</div></div>
      </div>`;
    }).join('') : `<div class="agenda-empty"><b>Your week is clear</b>Click any time on the calendar to schedule a call.</div>`}</div>
  </aside>`;

function viewCalWeek(){
  const ws = calStartOfWeek(calRef);
  const days = Array.from({length:7}, (_,i)=>{ const d=new Date(ws); d.setDate(ws.getDate()+i); return d; });
  const dayStrs = days.map(calFmtDate);
  const todayStr = calFmtDate(new Date());
  const weekAppts = state.appointments.filter(a=> dayStrs.includes(a.date));
  const HH=64;
  const minH=0, maxH=24;                 // full day, always scrollable to any hour
  _wkMinH=minH; _wkHH=HH;
  const hours=[]; for(let h=minH;h<maxH;h++) hours.push(h);
  const bodyH=(maxH-minH)*HH;
  const dowShort=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // where to auto-scroll: the workday, nudged for "now" and any early appointment
  const nowD=new Date();
  const todayVisible = dayStrs.includes(calFmtDate(nowD));
  let target = 7;
  if (todayVisible) target = Math.max(0, nowD.getHours()-2);
  let earliest=null; weekAppts.forEach(a=>{ const h=Math.floor(calToMin(a.time)/60); if(earliest==null||h<earliest) earliest=h; });
  if (earliest!=null) target = Math.min(target, Math.max(0, earliest-1));
  _wkScroll = target;
  const nowTop = ((nowD.getHours()*60 + nowD.getMinutes())/60)*HH;

  const label = (()=>{ const a=days[0], b=days[6];
    const mA=a.toLocaleDateString(undefined,{month:'short'}), mB=b.toLocaleDateString(undefined,{month:'short'});
    return a.getMonth()===b.getMonth()
      ? `${mA} ${a.getDate()} – ${b.getDate()}, ${b.getFullYear()}`
      : `${mA} ${a.getDate()} – ${mB} ${b.getDate()}, ${b.getFullYear()}`;
  })();

  const colHtml = days.map((d,di)=>{
    const ds=dayStrs[di];
    const isToday = ds===todayStr;
    const laid=calLayoutDay(weekAppts.filter(a=>a.date===ds));
    const evHtml=laid.map(({e,col,cols})=>{
      const a=e.a; const l=state.leads.find(x=>x.id===a.leadId);
      const top=((e.start - minH*60)/60)*HH;
      const duration=e.end-e.start;
      const height=Math.max(34, (duration/60)*HH - 3);
      const w=100/cols, left=col*w;
      const clientName=l?fullName(l):(a.title||'Appointment');
      const purpose=l&&a.title?a.title:(a.notes||'');
      const durationLabel=`${duration}m`;
      return `<div class="wk-evt ${duration<=30?'compact':''}" data-appt="${a.id}" title="${esc(`${calFmtTime12(a.time)} · ${clientName}${purpose?' · '+purpose:''}`)}" style="top:${top}px;height:${height}px;left:calc(${left}% + 2px);width:calc(${w}% - 4px);">
        <div class="wk-evt-main"><span class="wk-evt-t">${calFmtTime12(a.time)}</span><span class="wk-evt-title">${esc(clientName)}${duration<=30&&purpose?` · ${esc(purpose)}`:''} · ${durationLabel}</span></div>
        ${l&&a.title?`<div class="wk-evt-sub">${esc(a.title)} · ${durationLabel}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="wk-col ${isToday?'today':''}" data-date="${ds}" style="height:${bodyH}px">
      ${hours.map((h,hi)=>`<div class="wk-line" style="top:${hi*HH}px"></div>`).join('')}
      ${isToday?`<div class="wk-now" style="top:${nowTop}px"></div>`:''}
      ${evHtml}
    </div>`;
  }).join('');

  return `<div class="cal-view">` + calHeadHtml(label) + `
  <div class="calendar-stage">
    <div class="wk-wrap">
      <div class="wk-inner">
        <div class="wk-headrow">
          <div class="wk-gutter-h"></div>
          ${days.map((d,di)=>`<div class="wk-dayhead ${dayStrs[di]===todayStr?'today':''}"><span class="wk-dow">${dowShort[d.getDay()]}</span><span class="wk-dnum">${d.getDate()}</span></div>`).join('')}
        </div>
        <div class="wk-body">
          <div class="wk-gutter" style="height:${bodyH}px">
            ${hours.map((h,hi)=>`<div class="wk-hour" style="top:${hi*HH}px">${calFmtHour(h)}</div>`).join('')}
          </div>
          ${colHtml}
        </div>
      </div>
    </div>
    ${calendarAgenda(weekAppts,'This week')}
  </div></div>`;
}

function viewCalMonth(){
  const y = calRef.getFullYear(), m = calRef.getMonth();
  const first = new Date(y,m,1); const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);
  const cells = [];
  for (let i=startDow-1;i>=0;i--) cells.push({ d:prevDays-i, other:true, mo:m-1 });
  for (let d=1;d<=daysInMonth;d++) cells.push({ d, other:false, mo:m });
  while (cells.length % 7 !== 0 || cells.length < 42) { const last = cells[cells.length-1]; cells.push({ d:(last.other?last.d:0)+1, other:true, mo:m+1 }); if (cells.length>=42) break; }

  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthName = calRef.toLocaleDateString(undefined,{month:'long',year:'numeric'});

  const cellHtml = cells.map(c=>{
    const cy = c.mo<0?y-1:c.mo>11?y+1:y;
    const cm = (c.mo+12)%12;
    const dateStr = `${cy}-${String(cm+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`;
    const evts = state.appointments.filter(a=>a.date===dateStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    return `<div class="cal-cell ${c.other?'other':''} ${dateStr===todayStr?'today':''}" data-date="${dateStr}">
      <span class="cal-date">${c.d}</span>
      ${evts.slice(0,3).map(a=>{ const l=state.leads.find(x=>x.id===a.leadId);
        return `<div class="cal-evt" title="${esc(a.title)}" data-appt="${a.id}"><span class="t">${calFmtTime12(a.time)}</span> ${esc(l?fullName(l):a.title)}</div>`; }).join('')}
      ${evts.length>3?`<div class="cell-sub" style="font-size:10.5px;padding-left:4px;">+${evts.length-3} more</div>`:''}
    </div>`;
  }).join('');

  return calHeadHtml(monthName) + `
  <div class="cal-grid">
    ${dow.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
    ${cellHtml}
  </div>`;
}

function wireCalendar(){
  const prev=$('#calPrev'), next=$('#calNext'), today=$('#calToday');
  if (prev) prev.onclick = ()=>{ if(calMode==='week') calRef.setDate(calRef.getDate()-7); else calRef.setMonth(calRef.getMonth()-1); render(); };
  if (next) next.onclick = ()=>{ if(calMode==='week') calRef.setDate(calRef.getDate()+7); else calRef.setMonth(calRef.getMonth()+1); render(); };
  if (today) today.onclick = ()=>{ calRef = new Date(); render(); };
  $('#newApptBtn').onclick = ()=> apptModal(null, new Date().toISOString().slice(0,10));
  document.querySelectorAll('.cal-toggle button').forEach(b=> b.onclick = ()=>{ calMode = b.dataset.mode; render(); });
  document.querySelectorAll('[data-agenda-appt]').forEach(el=>el.onclick=()=>{
    const a=state.appointments.find(x=>x.id===el.dataset.agendaAppt);
    if(a) apptModal(a);
  });

  if (calMode==='week'){
    const wrap = document.querySelector('.wk-wrap');
    if (wrap) wrap.scrollTop = _wkScroll * _wkHH;
    document.querySelectorAll('.wk-col').forEach(col=> col.onclick = e=>{
      const evEl = e.target.closest('.wk-evt');
      if (evEl){ const a=state.appointments.find(x=>x.id===evEl.dataset.appt); if(a) apptModal(a); return; }
      const rect = col.getBoundingClientRect();
      let mins = _wkMinH*60 + ((e.clientY - rect.top)/_wkHH)*60;
      mins = Math.max(0, Math.min(24*60-15, Math.round(mins/15)*15));
      const hh=String(Math.floor(mins/60)).padStart(2,'0'), mm=String(mins%60).padStart(2,'0');
      apptModal(null, col.dataset.date, '', `${hh}:${mm}`);
    });
  } else {
    document.querySelectorAll('.cal-cell').forEach(c=> c.onclick = e=>{
      if (e.target.closest('.cal-evt')) { const id = e.target.closest('.cal-evt').dataset.appt; const a = state.appointments.find(x=>x.id===id); apptModal(a); return; }
      apptModal(null, c.dataset.date);
    });
  }
}

function readImportFile(file){
  if (file.size > 10*1024*1024){ toast('Choose a file smaller than 10 MB'); return; }
  if (!/\.(csv|tsv)$/i.test(file.name) && !/csv|tab-separated/.test(file.type)){ toast('Choose a CSV or TSV file'); return; }
  const reader = new FileReader();
  reader.onerror = ()=> toast('We could not read that file');
  reader.onload = ()=>{
    $('#pasteBox').value=String(reader.result||'').replace(/^\uFEFF/,'');
    const loaded=$('#fileLoaded'); loaded.textContent=`✓ ${file.name}`; loaded.classList.remove('hidden');
    setSourceMeta(`${formatFileSize(file.size)} · ready to map`);
    doParse(file.name);
  };
  reader.readAsText(file);
}
function formatFileSize(bytes){ return bytes<1024 ? `${bytes} B` : bytes<1048576 ? `${Math.round(bytes/1024)} KB` : `${(bytes/1048576).toFixed(1)} MB`; }
function detectDelim(text){
  const sample = text.slice(0,12000);
  const candidates = [',','\t',';','|'];
  let best=',', bestScore=-1;
  candidates.forEach(delim=>{
    const rows=parseDelimitedText(sample,delim).slice(0,8);
    const widths=rows.filter(r=>r.some(Boolean)).map(r=>r.length);
    if (!widths.length) return;
    const mode=Math.max(...widths.map(w=>widths.filter(x=>x===w).length));
    const score=(mode*10)+Math.max(...widths);
    if (Math.max(...widths)>1 && score>bestScore){ best=delim; bestScore=score; }
  });
  return best;
}
// RFC 4180-style parser: supports escaped quotes, CRLF, and quoted line breaks.
function parseDelimitedText(text, delim){
  const rows=[]; let row=[], cell='', quoted=false;
  text=String(text||'').replace(/^\uFEFF/,'');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(quoted){
      if(ch==='"' && text[i+1]==='"'){ cell+='"'; i++; }
      else if(ch==='"') quoted=false;
      else cell+=ch;
    } else if(ch==='"') quoted=true;
    else if(ch===delim){ row.push(cell.trim()); cell=''; }
    else if(ch==='\n' || ch==='\r'){
      if(ch==='\r' && text[i+1]==='\n') i++;
      row.push(cell.trim()); cell='';
      if(row.some(v=>v!=='')) rows.push(row);
      row=[];
    } else cell+=ch;
  }
  row.push(cell.trim());
  if(row.some(v=>v!=='')) rows.push(row);
  return rows;
}
function looksLikeHeader(cells){
  const normalized=cells.map(normalize);
  const known=normalized.filter(c=>guessField(c)).length;
  const numeric=cells.filter(c=>c!=='' && !isNaN(Number(c.replace(/[$,]/g,'')))).length;
  const looksLikeData=cells.some(c=>/@/.test(c) || /\d{7,}/.test(c.replace(/\D/g,'')));
  return known>0 || (numeric===0 && !looksLikeData);
}
function normalize(s){ return s.toLowerCase().replace(/[_\-.]/g,' ').replace(/\s+/g,' ').trim(); }
function containsSeq(arr, seq){
  if (seq.length > arr.length) return false;
  for (let i=0; i<=arr.length-seq.length; i++){
    let ok=true;
    for (let j=0; j<seq.length; j++){ if (arr[i+j]!==seq[j]){ ok=false; break; } }
    if (ok) return true;
  }
  return false;
}
function guessField(header){
  const h = normalize(header);
  const htok = h.split(' ').filter(Boolean);
  // 1) exact phrase match against a known synonym
  for (const [key, syns] of Object.entries(SYNONYMS)){
    if (syns.includes(h)) return key;
  }
  // 2) token-aware match (avoids false positives like "best time" -> "st")
  for (const [key, syns] of Object.entries(SYNONYMS)){
    for (const s of syns){
      const stok = s.split(' ').filter(Boolean);
      if (stok.length === 1){
        // single-word synonym only matches a single-word header (exact token)
        if (htok.length === 1 && htok[0] === stok[0]) return key;
      } else {
        // multi-word synonym matches if it appears as consecutive words in the header
        if (containsSeq(htok, stok)) return key;
      }
    }
  }
  return '';
}
function doParse(fileName=''){
  const text = $('#pasteBox').value.trim();
  if (!text){ toast('Paste some rows first'); return; }
  const delim = detectDelim(text);
  let rows = parseDelimitedText(text, delim);
  if (!rows.length){ toast('We could not find any rows in that data'); return; }
  const width = Math.max(...rows.map(r=>r.length));
  rows = rows.map(r=>{ while(r.length<width) r.push(''); return r; });

  const hasHeader = looksLikeHeader(rows[0]);
  let headers, dataRows;
  if (hasHeader){ headers = rows[0]; dataRows = rows.slice(1); }
  else { headers = rows[0].map((_,i)=>`Column ${i+1}`); dataRows = rows; }

  const mapping = headers.map(h=> hasHeader ? (guessField(h) || '__note__') : '');
  importParsed = { headers, rows: dataRows, mapping, hasHeader, fileName, delimiter:delim };
  renderMapStep();
  $('#mapStep').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildLeadsFromImport(){
  const { headers, rows, mapping } = importParsed;
  return rows.map(r=>{
    const lead = { id:uid(), stage:'new', createdAt:Date.now(), activity:[{ts:Date.now(),text:'Imported from CSV',type:'system'}] };
    mapping.forEach((field,i)=>{
      if (!field) return;
      const val = (r[i]||'').trim(); if (!val) return;
      if (field==='fullName'){
        const parts = val.split(/\s+/);
        lead.firstName = parts.shift()||''; lead.lastName = parts.join(' ');
      } else if (field==='notes' || field==='__note__'){
        const line = (field==='__note__') ? `${headers[i]}: ${val}` : val;
        lead.notes = (lead.notes ? lead.notes+'\n' : '') + line;
      } else if (field==='stage'){
        const normalized = normalize(val);
        const match = STAGES.find(s=>normalize(s.id)===normalized || normalize(s.label)===normalized);
        if (match) lead.stage=match.id;
        else lead.notes=(lead.notes?lead.notes+'\n':'')+`${headers[i]}: ${val}`;
      } else if (field==='callObjections'){
        lead.callObjections=val.split(/[;,|]/).map(x=>x.trim()).filter(Boolean);
      } else lead[field] = val;
    });
    if (lead.phone) lead.phone = fmtPhone(lead.phone);
    if (lead.dob && !lead.age){ const a = ageFromDob(lead.dob); if (a) lead.age = a; }
    return lead;
  }).filter(l=> l.firstName || l.lastName || l.phone || l.email);
}
function renderPreview(){
  const leads = buildLeadsFromImport();
  const existing = new Set(state.leads.flatMap(l=>[
    l.phone ? `p:${l.phone.replace(/\D/g,'')}` : '',
    l.email ? `e:${l.email.toLowerCase()}` : ''
  ]).filter(Boolean));
  const batch = new Set(); let duplicates=0, invalidEmails=0;
  leads.forEach(l=>{
    const keys=[l.phone?`p:${l.phone.replace(/\D/g,'')}`:'',l.email?`e:${l.email.toLowerCase()}`:''].filter(Boolean);
    if(keys.some(k=>existing.has(k)||batch.has(k))) duplicates++;
    keys.forEach(k=>batch.add(k));
    if(l.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(l.email)) invalidEmails++;
  });
  const willSkip = $('#dedupe')?.checked ? duplicates : 0;
  const ready = Math.max(0,leads.length-willSkip);
  $('#importN').textContent = ready;
  $('#doImport').disabled = ready===0;
  $('#importSummary').innerHTML = `<div class="import-summary-icon">✓</div><div><strong>${ready} client${ready!==1?'s':''} ready to import</strong><span>${duplicates?`<span class="import-warning">${duplicates} duplicate${duplicates!==1?'s':''}${willSkip?' will be skipped':' found'}</span> · `:''}${invalidEmails?`<span class="import-error">${invalidEmails} email${invalidEmails!==1?'s':''} may be invalid</span> · `:''}${leads.length} valid row${leads.length!==1?'s':''} detected</span></div>`;
  const cols = ['firstName','lastName','phone','email','state','policyType','coverageAmount','premium'];
  $('#previewWrap').innerHTML = `<table><thead><tr>${cols.map(c=>`<th>${FIELDS.find(f=>f.key===c).label}</th>`).join('')}</tr></thead>
    <tbody>${leads.slice(0,6).map(l=>`<tr>${cols.map(c=>`<td class="${['coverageAmount','premium','phone'].includes(c)?'num':''}">${esc(l[c]||'—')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
function commitImport(){
  let leads = buildLeadsFromImport();
  if (leads.length===0){ toast('No valid leads to import'); return; }
  if ($('#dedupe').checked){
    const seen = new Set(state.leads.flatMap(l=>[
      l.phone ? `p:${l.phone.replace(/\D/g,'')}` : '',
      l.email ? `e:${l.email.toLowerCase()}` : ''
    ]).filter(Boolean));
    const before = leads.length;
    leads = leads.filter(l=>{
      const keys=[l.phone?`p:${l.phone.replace(/\D/g,'')}`:'',l.email?`e:${l.email.toLowerCase()}`:''].filter(Boolean);
      if (keys.some(k=>seen.has(k))) return false;
      keys.forEach(k=>seen.add(k));
      return true;
    });
    var skipped = before - leads.length;
  }
  state.leads = leads.concat(state.leads);
  save();
  $('#pasteBox') && ($('#pasteBox').value='');
  importParsed = null;
  toast(`Imported ${leads.length} client${leads.length!==1?'s':''}${skipped?` · skipped ${skipped} duplicate${skipped!==1?'s':''}`:''}`);
  go('leads');
}

let googlePlacesPromise = null;
function loadGooglePlaces(){
  if (window.google?.maps?.importLibrary) return Promise.resolve();
  if (googlePlacesPromise) return googlePlacesPromise;
  googlePlacesPromise = new Promise((resolve,reject)=>{
    const callback = '__jarvisPlacesReady';
    window[callback] = ()=>{ delete window[callback]; resolve(); };
    const script=document.createElement('script');
    script.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(GOOGLE_MAPS_KEY)}&v=weekly&loading=async&callback=${callback}`;
    script.async=true;
    script.onerror=()=>reject(new Error('Google Places could not load'));
    document.head.appendChild(script);
  });
  return googlePlacesPromise;

async function setupAddressAutocomplete(drawer,lead){
  const input=drawer.querySelector('[data-f="address"]');
  const list=drawer.querySelector('#addressSuggestions');
  const status=drawer.querySelector('#addressStatus');
  if (!input || !list) return;
  input.setAttribute('autocomplete','street-address');
  let newestRequest=0, sessionToken=null, suppress=false;
  const clear=()=>{ list.replaceChildren(); list.classList.remove('open'); };
  try {
    await loadGooglePlaces();
    const {AutocompleteSessionToken,AutocompleteSuggestion}=await google.maps.importLibrary('places');
    sessionToken=new AutocompleteSessionToken();
    const search=debounce(async()=>{
      const query=input.value.trim();
      const requestId=++newestRequest;
      if (suppress || query.length<3){ clear(); return; }
      status.textContent='Finding addresses…'; status.classList.add('show');
      try {
        const {suggestions}=await AutocompleteSuggestion.fetchAutocompleteSuggestions({
          input:query,
          includedPrimaryTypes:['street_address'],
          includedRegionCodes:['us'],
          language:'en-US',
          region:'us',
          sessionToken
        });
        if (requestId!==newestRequest) return;
        clear();
        suggestions.slice(0,6).forEach(suggestion=>{
          const prediction=suggestion.placePrediction;
          if (!prediction) return;
          const button=document.createElement('button');
          button.type='button'; button.className='address-suggestion';
          const pin=document.createElement('span'); pin.className='address-suggestion-pin'; pin.textContent='●';
          const text=document.createElement('span'); text.textContent=prediction.text.toString();
          button.append(pin,text);
          button.onclick=async()=>{
            suppress=true; clear(); status.textContent='Filling address…'; status.classList.add('show');
            try {
              const place=prediction.toPlace();
              await place.fetchFields({fields:['addressComponents']});
              let streetNumber='',route='',city='',region='',postal='',postalSuffix='';
              (place.addressComponents||[]).forEach(component=>{
                if(component.types.includes('street_number')) streetNumber=component.longText;
                if(component.types.includes('route')) route=component.shortText;
                if(component.types.includes('locality')) city=component.longText;
                if(!city && component.types.includes('sublocality_level_1')) city=component.longText;
                if(component.types.includes('administrative_area_level_1')) region=component.shortText;
                if(component.types.includes('postal_code')) postal=component.longText;
                if(component.types.includes('postal_code_suffix')) postalSuffix=component.longText;
              });
              const values={address:[streetNumber,route].filter(Boolean).join(' '),city,state:region,zip:postal+(postalSuffix?'-'+postalSuffix:'')};
              Object.entries(values).forEach(([key,value])=>{
                const field=drawer.querySelector(`[data-f="${key}"]`);
                if (field && value){ field.value=value; lead[key]=value; }
              });
              save(); status.textContent='Address filled automatically'; toast('Address filled');
              sessionToken=new AutocompleteSessionToken();
            } catch(e){ status.textContent='Could not fill that address — you can still type it manually.'; }
            setTimeout(()=>status.classList.remove('show'),2600);
            suppress=false;
          };
          list.appendChild(button);
        });
        list.classList.toggle('open',list.children.length>0);
        status.classList.remove('show');
      } catch(e){
        if (requestId!==newestRequest) return;
        clear(); status.textContent='Address suggestions unavailable — manual entry still works.'; status.classList.add('show');
      }
    },300);
    input.addEventListener('input',search);
    input.addEventListener('focus',()=>{ if(list.children.length) list.classList.add('open'); });
    input.addEventListener('blur',()=>setTimeout(clear,180));
  } catch(e){
    status.textContent='Address suggestions unavailable — manual entry still works.';
    status.classList.add('show');
  }
}

  const bookHandler = ()=> apptModal(null, todayStr, lead.id);

  stopCallTimer(); callTimerStartedAt = null; callTimerElapsed = 0;
