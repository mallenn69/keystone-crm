  const fmtDuration = secs => `${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;
  const tickCall = ()=>{
    const running = callTimerStartedAt ? Math.floor((Date.now()-callTimerStartedAt)/1000) : 0;
    timerEl.textContent = fmtDuration(callTimerElapsed+running);
  };
  startCallBtn.onclick = ()=>{
    if (callTimerStartedAt){
      callTimerElapsed += Math.floor((Date.now()-callTimerStartedAt)/1000);
      stopCallTimer(); callTimerStartedAt = null; tickCall(); timerEl.classList.remove('live'); startCallBtn.textContent='Resume call';
    } else {
      callTimerStartedAt = Date.now(); timerEl.classList.add('live'); startCallBtn.textContent='Pause';
      callTimerInterval = setInterval(tickCall,1000);
    }
  };
  const objectionCoach = {
    'Price':'“Totally fair. Is the concern the monthly amount, or whether the coverage feels worth it?”',
    'Need to think':'“Of course. What part would you want to think through—the coverage, carrier, or budget?”',
    'Spouse / partner':'“Makes sense. What would they need to see or hear to feel comfortable deciding together?”',
    'Already covered':'“That’s good—you value protection. When was it last reviewed, and what was it designed to cover?”',
    'Trust':'“You should be careful. Let’s slow down—what would you need to verify before moving forward?”',
    'Timing':'“Understood. What changes between now and then that would make the timing better?”'
  };
  d.querySelectorAll('.objection-chip').forEach(b=> b.onclick = ()=>{
    const current = new Set(Array.isArray(lead.callObjections)?lead.callObjections:[]);
    if (current.has(b.dataset.objection)) current.delete(b.dataset.objection); else current.add(b.dataset.objection);
    lead.callObjections = [...current]; b.classList.toggle('on',current.has(b.dataset.objection));
    const selected = [...current].at(-1);
    $('#objectionCoach').textContent = selected ? objectionCoach[selected] : '';
    $('#objectionCoach').classList.toggle('show',!!selected);
    save();
  });
  const updateReadiness = ()=>{
    const keys=['callGoal','monthlyBudget','existingCoverage','decisionMaker','purchaseTimeline','nextCallStep'];
    const pct=Math.round(keys.filter(k=>{
      const el=d.querySelector(`[data-f="${k}"]`); return el ? el.value.trim() : lead[k];
    }).length/keys.length*100);
    $('#readinessFill').style.width=pct+'%'; $('#readinessNum').textContent=pct+'%';
  };
  d.querySelectorAll('.discovery-grid [data-f], #nextCallStep').forEach(el=>el.addEventListener('input',updateReadiness));
  $('#completeCall').onclick = ()=>{
    const outcome = $('#callOutcome').value;
    const nextStep = $('#nextCallStep').value.trim();
    if (!outcome){ toast('Choose a call outcome first'); $('#callOutcome').focus(); return; }
    if (!nextStep && !['No answer','Left voicemail','Wrong number','Not interested'].includes(outcome)){ toast('Add the next action before completing the call'); $('#nextCallStep').focus(); return; }
    const seconds = callTimerElapsed + (callTimerStartedAt ? Math.floor((Date.now()-callTimerStartedAt)/1000) : 0);
    d.querySelectorAll('[data-f]').forEach(inp=> lead[inp.dataset.f]=(inp.value||'').trim());
    const discovery = [lead.callGoal&&`Goal: ${esc(lead.callGoal)}`,lead.monthlyBudget&&`Budget: ${esc(lead.monthlyBudget)}`,lead.existingCoverage&&`Coverage: ${esc(lead.existingCoverage)}`].filter(Boolean).join(' · ');
    const objectionText = (lead.callObjections||[]).length ? `<br>Objections: ${lead.callObjections.map(esc).join(', ')}` : '';
    lead.activity=lead.activity||[];
    lead.activity.unshift({ts:Date.now(),type:'note',text:`<b>Call completed — ${esc(outcome)}</b>${seconds?` · ${fmtDuration(seconds)}`:''}${nextStep?`<br>Next: ${esc(nextStep)}`:''}${discovery?`<br>${discovery}`:''}${objectionText}`});
    lead.callCount=(Number(lead.callCount)||0)+1; lead.lastCallAt=Date.now(); lead.lastCallOutcome=outcome;
    if (lead.stage==='new') lead.stage = outcome==='Appointment booked'?'appointment':'contacted';
    stopCallTimer(); callTimerStartedAt=null; callTimerElapsed=0; save(); renderDrawer(lead); toast('Call logged with a clear next step');
  };

  // follow-up quick-set buttons
  d.querySelectorAll('.fu-quick button').forEach(b=> b.onclick = ()=>{
    const days = Number(b.dataset.fu);
    const inp = d.querySelector('[data-f="followUpDate"]');
    if (days===0){ inp.value=''; }
    else { const dt=new Date(); dt.setDate(dt.getDate()+days); inp.value=dt.toISOString().slice(0,10); }
    inp.dispatchEvent(new Event('input',{bubbles:true}));
  });

  // stage buttons
  d.querySelectorAll('.stage-btn').forEach(b=> b.onclick = ()=>{
    const st = b.dataset.stage; if (lead.stage===st) return;
    lead.stage = st; lead.activity = lead.activity||[]; lead.activity.unshift({ts:Date.now(),text:`Stage &rarr; <b>${stageById(st).label}</b>`,type:'stage'});
    save(); renderDrawer(lead);
  });

  // disposition quick-log
  d.querySelectorAll('.dispo').forEach(b=> b.onclick = ()=>{
    lead.activity = lead.activity||[]; lead.activity.unshift({ts:Date.now(),text:`Call: ${esc(b.dataset.dispo)}`,type:'note'});
    if (lead.stage==='new') lead.stage='contacted';
    save(); $('#timeline').innerHTML=renderTimeline(lead);
    d.querySelectorAll('.stage-btn').forEach(x=>{ const on=x.dataset.stage===lead.stage; x.classList.toggle('on',on); x.style.background = on? stageById(lead.stage).color : ''; });
    toast(b.dataset.dispo);
  });

  // scratch autosave + log
  const scratch = $('#scratch');
  const updateScratch = debounce(()=>{ lead.scratch = scratch.value; save(); }, 350);
  scratch.addEventListener('input', ()=>{
    $('#noteCount').textContent = `${scratch.value.length} characters`;
    updateScratch();
  });
  const logScratch = ()=>{
    const v = scratch.value.trim(); if(!v){ toast('Nothing to log yet'); return; }
    lead.activity = lead.activity||[]; lead.activity.unshift({ts:Date.now(),text:esc(v),type:'note'});
    lead.scratch=''; scratch.value=''; $('#noteCount').textContent='0 characters'; save(); $('#timeline').innerHTML=renderTimeline(lead); toast('Note saved to activity');
  };
  $('#logNote').onclick = logScratch;
  scratch.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); logScratch(); } });

  // field autosave &mdash; nothing is ever lost
  const saveFields = debounce(()=>{ d.querySelectorAll('[data-f]').forEach(inp=> lead[inp.dataset.f] = (inp.value||'').trim()); save(); }, 350);
  d.querySelectorAll('[data-f]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      lead[inp.dataset.f] = (inp.value||'').trim();
      if ($('#callScriptDock')?.classList.contains('open')) updateCallScriptPreview(lead);
      saveFields();
      if (inp.dataset.f==='firstName' || inp.dataset.f==='lastName'){
        const fn=d.querySelector('[data-f="firstName"]').value, ln=d.querySelector('[data-f="lastName"]').value;
        $('#dName').textContent = [fn,ln].filter(Boolean).join(' ') || '(no name)';
      }
    });
    inp.addEventListener('change', saveFields);
  });
  setupAddressAutocomplete(d,lead);

  // tidy-ups on blur: format the phone, fill age from DOB
  const phoneInp = d.querySelector('[data-f="phone"]');
  if (phoneInp) phoneInp.addEventListener('blur', ()=>{
    const f = fmtPhone(phoneInp.value.trim());
    if (f && f !== phoneInp.value){ phoneInp.value = f; lead.phone = f; save(); }
  });
  const dobInp = d.querySelector('[data-f="dob"]'), ageInp = d.querySelector('[data-f="age"]');
  if (dobInp && ageInp) dobInp.addEventListener('blur', ()=>{
    const a = ageFromDob(dobInp.value);
    if (a && !ageInp.value){ ageInp.value = a; lead.age = a; save(); }
  });

  // delete (in-app confirm &mdash; native confirm() is blocked in the sandbox)
  $('#delLead').onclick = ()=> confirmDialog('Delete client?', `This permanently removes <b>${esc(fullName(lead))}</b> and any appointments. This can't be undone.`, ()=>{
    state.leads = state.leads.filter(l=>l.id!==lead.id);
    state.appointments = state.appointments.filter(a=>a.leadId!==lead.id);
    save(); openLeadId=null;
    $('#overlay').classList.remove('open'); $('#drawer').classList.remove('open');
    render(); toast('Client deleted');
  });
}
function renderTimeline(lead){
  const acts = lead.activity||[];
  if (!acts.length) return '<div class="cell-sub">No activity yet.</div>';
  return acts.map(a=>`<div class="tl-item"><div class="tl-dot" style="background:${a.type==='stage'?'var(--s-appointment)':a.type==='system'?'var(--ink-3)':'var(--accent)'}"></div>
    <div class="tl-body"><div class="tl-text">${a.text}</div><div class="tl-time">${relTime(a.ts)}</div></div></div>`).join('');
}

/* ========================= modal / confirm ========================= */
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
function openModal(title, body, foot){ $('#modalTitle').textContent=title; $('#modalBody').innerHTML=body; $('#modalFoot').innerHTML=foot; $('#modal').classList.add('open'); }
function closeModal(){ $('#modal').classList.remove('open'); }
function confirmDialog(title, msg, onYes, yesLabel='Delete', danger=true){
  openModal(title, `<p style="margin:0;color:var(--ink-2);line-height:1.55;">${msg}</p>`,
    `<button class="btn ghost" onclick="closeModal()">Cancel</button>
     <button class="btn ${danger?'danger':''}" id="confirmYes">${yesLabel}</button>`);
  $('#confirmYes').onclick = ()=>{ closeModal(); onYes(); };
}
function apptModal(appt, presetDate, presetLeadId, presetTime){
  const isNew = !appt;
  const a = appt || { id:uid(), date:presetDate||new Date().toISOString().slice(0,10), time:presetTime||'10:00', duration:30, title:'', leadId:presetLeadId||'', notes:'' };
  const leadOpts = `<option value="">&mdash; No client &mdash;</option>` + state.leads.slice().sort((x,y)=>fullName(x).localeCompare(fullName(y))).map(l=>`<option value="${l.id}" ${a.leadId===l.id?'selected':''}>${esc(fullName(l))}</option>`).join('');
  const durOpts = [[15,'15 min'],[30,'30 min'],[45,'45 min'],[60,'1 hour'],[90,'1.5 hours'],[120,'2 hours']]
    .map(([v,t])=>`<option value="${v}" ${(Number(a.duration)||30)===v?'selected':''}>${t}</option>`).join('');
  openModal(isNew?'New appointment':'Edit appointment', `
    <div class="field-grid">
      <div class="field full"><label>Title</label><input id="aTitle" value="${esc(a.title)}" placeholder="e.g. Policy review call"></div>
      <div class="field"><label>Date</label><input id="aDate" type="date" value="${a.date}"></div>
      <div class="field"><label>Time</label><input id="aTime" type="time" value="${a.time}"></div>
      <div class="field"><label>Length</label><select id="aDur">${durOpts}</select></div>
      <div class="field"><label>Client</label><select id="aLead">${leadOpts}</select></div>
      <div class="field full"><label>Notes</label><textarea id="aNotes" rows="2" style="border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 10px;background:var(--surface-2);color:var(--ink);outline:none;">${esc(a.notes)}</textarea></div>
    </div>`,
    `${!isNew?'<button class="btn danger" id="aDel" style="margin-right:auto;">Delete</button>':''}
     <button class="btn ghost" onclick="closeModal()">Cancel</button>
     <button class="btn" id="aSave">${isNew?'Add appointment':'Save'}</button>`);
  $('#aSave').onclick = ()=>{
    a.title=$('#aTitle').value.trim()||'Appointment'; a.date=$('#aDate').value; a.time=$('#aTime').value; a.duration=Number($('#aDur').value)||30; a.leadId=$('#aLead').value; a.notes=$('#aNotes').value.trim();
    if (isNew) state.appointments.push(a);
    // reflect on lead + stage bump
    if (a.leadId){ const l=state.leads.find(x=>x.id===a.leadId); if(l){ l.activity=l.activity||[]; l.activity.unshift({ts:Date.now(),text:`Appointment set for ${a.date} ${a.time}`,type:'stage'}); if(l.stage==='new'||l.stage==='contacted') l.stage='appointment'; } }
    save(); closeModal(); toast(isNew?'Appointment added':'Appointment saved');
    if (openLeadId){ const l=state.leads.find(x=>x.id===openLeadId); if(l) renderDrawer(l); }
    render();
  };
  const del = $('#aDel'); if (del) del.onclick = ()=>{ state.appointments = state.appointments.filter(x=>x.id!==a.id); save(); closeModal(); toast('Appointment deleted'); if(openLeadId){const l=state.leads.find(x=>x.id===openLeadId);if(l)renderDrawer(l);} render(); };
}

/* ========================= backup / restore ========================= */
function downloadFile(name, text, mime){
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function exportClientsCsv(){
  const rows = filteredLeads();
  if (!rows.length){ toast('No clients to export'); return; }
  const cols = FIELDS.map(f=>f.key).concat(['stage']);
  const labels = FIELDS.map(f=>f.label).concat(['Stage']);
  const cell = v => { const s = String(v==null?'':v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const csv = [labels.join(',')]
    .concat(rows.map(l=> cols.map(c=> cell(c==='stage' ? stageById(l.stage).label : c==='callObjections' && Array.isArray(l[c]) ? l[c].join('; ') : l[c])).join(',')))
    .join('\n');
  downloadFile(`clients-${new Date().toISOString().slice(0,10)}.csv`, csv, 'text/csv');
  toast(`Exported ${rows.length} client${rows.length!==1?'s':''}`);
}
$('#exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(state.brand||'jarvis-life').toLowerCase().replace(/\s+/g,'-')}-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Backup downloaded');
};
$('#restoreBtn').onclick = ()=> $('#restoreFile').click();
$('#restoreFile').onchange = e=>{
  const file = e.target.files[0]; if(!file){ return; }
  const reader = new FileReader();
  reader.onload = ()=>{
    let data; try { data = JSON.parse(reader.result); } catch(err){ data = null; }
    if (!data || !Array.isArray(data.leads)){ toast("That doesn't look like a Jarvis Life backup"); e.target.value=''; return; }
    confirmDialog('Restore this backup?', `This replaces your current data with the backup (<b>${data.leads.length}</b> clients, <b>${(data.appointments||[]).length}</b> appointments). Export a backup first if you're unsure.`, ()=>{
      state = Object.assign({ leads:[], appointments:[], leadCosts:[], scripts:[], brand:'Jarvis Life', theme:state.theme, view:'dashboard' }, data);
      state.theme = state.theme || null;
      save(); applyTheme();
      $('#brandName').textContent = state.brand||'Jarvis Life';
      document.title = (state.brand||'Jarvis Life') + ' - Life Insurance CRM';
      render(); toast('Backup restored');
    }, 'Restore', false);
    e.target.value='';
  };
  reader.readAsText(file);
};

/* ========================= boot + auth ========================= */
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); if($('#drawer').classList.contains('open')) closeDrawer(); } });

const authScreen = document.getElementById('authScreen');
let authMode = 'signin';
function showAuth(){ authScreen.classList.add('open'); }
function hideAuth(){ authScreen.classList.remove('open'); }
function authError(msg){ const e=document.getElementById('authError'); e.textContent=msg||''; e.style.display = msg?'block':'none'; }
function setAuthMode(m){
  authMode = m;
  document.getElementById('authTitle').textContent = m==='signup' ? 'Create your account' : 'Welcome back';
  document.getElementById('authSubmit').textContent = m==='signup' ? 'Create account' : 'Sign in';
  document.getElementById('authToggleText').innerHTML = m==='signup'
    ? 'Already have an account? <a href="#" id="authToggle">Sign in</a>'
    : 'First time here? <a href="#" id="authToggle">Create an account</a>';
  document.getElementById('authToggle').onclick = ev=>{ ev.preventDefault(); setAuthMode(m==='signup'?'signin':'signup'); };
  authError('');
}
async function submitAuth(){
  if (!sb){ authError('Cloud is unavailable right now. Try again in a moment.'); return; }
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password){ authError('Enter your email and password.'); return; }
  if (authMode==='signup' && password.length < 6){ authError('Use a password of at least 6 characters.'); return; }
  const btn = document.getElementById('authSubmit'); btn.disabled=true; const orig=btn.textContent; btn.textContent='Please wait…';
  try {
    if (authMode==='signup'){
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (!data.session){ authError('Account created — check your email to confirm, then sign in.'); setAuthMode('signin'); }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }
  } catch(e){ authError(e.message || 'Something went wrong. Please try again.'); }
  finally { btn.disabled=false; btn.textContent=orig; }
}
async function onSignedIn(user){
  if (currentUser && currentUser.id === user.id) return;
  currentUser = user;
  const em = document.getElementById('userEmail'); if (em) em.textContent = user.email || '';
  hideAuth();
  await loadCloud();
  applyTheme();
  document.title = (state.brand||'Jarvis Life') + ' - Life Insurance CRM';
  if (!state.view) state.view='dashboard';
  render();
}
function onSignedOut(){
  currentUser = null;
  try { localStorage.removeItem(KEY); } catch(e){}
  state = normalizeState(null);
  setSync('');
  showAuth(); setAuthMode('signin');
  document.getElementById('authEmail').value=''; document.getElementById('authPassword').value='';
}

document.getElementById('authSubmit').onclick = submitAuth;
document.getElementById('authPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAuth(); });
document.getElementById('authEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('authPassword').focus(); });
document.getElementById('signOutBtn').onclick = ()=>{ if(sb) sb.auth.signOut(); };
setAuthMode('signin');

if (sb){
  sb.auth.onAuthStateChange((event, session)=>{
    if (session) _accessToken = session.access_token;
    if ((event==='SIGNED_IN' || event==='INITIAL_SESSION' || event==='TOKEN_REFRESHED') && session && session.user){ onSignedIn(session.user); }
    else if (event==='SIGNED_OUT'){ _accessToken = null; onSignedOut(); }
  });
  (async ()=>{
    try {
      const { data:{ session } } = await sb.auth.getSession();
      if (session && session.user){ _accessToken = session.access_token; onSignedIn(session.user); } else showAuth();
    } catch(e){ showAuth(); }
  })();
} else {
  // Cloud library unavailable — fall back to local-only so the app still works
  hideAuth(); applyTheme();
  document.title = (state.brand||'Jarvis Life') + ' - Life Insurance CRM';
  if (!state.view) state.view='dashboard';
  render();
}
</script>
