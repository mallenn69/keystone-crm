<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keystone - Life Insurance CRM</title>
</head>
<body>
<style>
  :root {
    --bg: #eef1ef;
    --surface: #ffffff;
    --surface-2: #f6f8f7;
    --border: #dde3e0;
    --border-strong: #c8d1cd;
    --ink: #14201c;
    --ink-2: #4a5a54;
    --ink-3: #7d8b85;
    --sidebar: #132a26;
    --sidebar-ink: #cfe0da;
    --sidebar-ink-2: #7fa099;
    --sidebar-active: #1d3d37;
    --accent: #0d9488;
    --accent-strong: #0b7d73;
    --accent-soft: #d4ede9;
    --shadow: 0 1px 2px rgba(19,42,38,.06), 0 4px 16px rgba(19,42,38,.06);
    --shadow-lg: 0 8px 40px rgba(19,42,38,.16);
    --radius: 10px;
    --radius-sm: 7px;

    --s-new: #64748b;      --s-new-bg: #eef1f5;
    --s-contacted: #0891b2;--s-contacted-bg: #e0f3f8;
    --s-appointment:#7c3aed;--s-appointment-bg:#efe8fd;
    --s-quoted: #d97706;   --s-quoted-bg: #fbeeda;
    --s-application:#0d9488;--s-application-bg:#d4ede9;
    --s-won: #16a34a;      --s-won-bg: #dcf3e3;
    --s-lost: #dc2626;     --s-lost-bg: #fbe2e2;

    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", ui-monospace, "JetBrains Mono", "Roboto Mono", Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1512; --surface: #16211d; --surface-2: #1b2924;
      --border: #263631; --border-strong: #33473f;
      --ink: #e6efeb; --ink-2: #9db3ab; --ink-3: #6e847c;
      --sidebar: #0d1a17; --sidebar-active: #17302b;
      --accent: #19b3a4; --accent-strong: #22c3b3; --accent-soft: #123330;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.5);
      --s-new-bg:#20272e; --s-contacted-bg:#0c2b33; --s-appointment-bg:#241a3a;
      --s-quoted-bg:#33260f; --s-application-bg:#123330; --s-won-bg:#0f2c1a; --s-lost-bg:#331617;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0d1512; --surface: #16211d; --surface-2: #1b2924;
    --border: #263631; --border-strong: #33473f;
    --ink: #e6efeb; --ink-2: #9db3ab; --ink-3: #6e847c;
    --sidebar: #0d1a17; --sidebar-active: #17302b;
    --accent: #19b3a4; --accent-strong: #22c3b3; --accent-soft: #123330;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.3);
    --shadow-lg: 0 8px 40px rgba(0,0,0,.5);
    --s-new-bg:#20272e; --s-contacted-bg:#0c2b33; --s-appointment-bg:#241a3a;
    --s-quoted-bg:#33260f; --s-application-bg:#123330; --s-won-bg:#0f2c1a; --s-lost-bg:#331617;
  }
  :root[data-theme="light"] {
    --bg: #eef1ef; --surface: #ffffff; --surface-2: #f6f8f7;
    --border: #dde3e0; --border-strong: #c8d1cd;
    --ink: #14201c; --ink-2: #4a5a54; --ink-3: #7d8b85;
    --sidebar: #132a26; --sidebar-active: #1d3d37;
    --accent: #0d9488; --accent-strong: #0b7d73; --accent-soft: #d4ede9;
    --s-new-bg:#eef1f5; --s-contacted-bg:#e0f3f8; --s-appointment-bg:#efe8fd;
    --s-quoted-bg:#fbeeda; --s-application-bg:#d4ede9; --s-won-bg:#dcf3e3; --s-lost-bg:#fbe2e2;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  h1,h2,h3 { margin: 0; text-wrap: balance; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  ::selection { background: var(--accent-soft); }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* ---------- shell ---------- */
  .app { display: grid; grid-template-columns: 236px 1fr; min-height: 100vh; }
  .sidebar { background: var(--sidebar); color: var(--sidebar-ink); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 20px 18px 18px; }
  .brand .glyph { width: 30px; height: 30px; flex: none; }
  .brand-name { font-weight: 700; font-size: 16px; letter-spacing: .2px; color: #fff; outline: none; }
  .brand-name:focus { text-decoration: underline dotted var(--sidebar-ink-2); }
  .nav { display: flex; flex-direction: column; gap: 2px; padding: 8px 12px; }
  .nav button { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; background: none; border: 0; color: var(--sidebar-ink); padding: 9px 11px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; }
  .nav button svg { width: 17px; height: 17px; flex: none; opacity: .85; }
  .nav button:hover { background: rgba(255,255,255,.05); }
  .nav button.active { background: var(--sidebar-active); color: #fff; }
  .nav button.active svg { opacity: 1; }
  .nav .count { margin-left: auto; font-size: 11px; font-weight: 600; background: rgba(255,255,255,.1); padding: 1px 7px; border-radius: 20px; font-variant-numeric: tabular-nums; }
  .sidebar-foot { margin-top: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(255,255,255,.07); }
  .sidebar-foot button { background: rgba(255,255,255,.06); color: var(--sidebar-ink); border: 0; border-radius: var(--radius-sm); padding: 8px; font-size: 12.5px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; }
  .sidebar-foot button:hover { background: rgba(255,255,255,.12); }
  .sidebar-foot svg { width: 15px; height: 15px; }

  .main { min-width: 0; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 20; }
  .topbar h1 { font-size: 19px; font-weight: 650; }
  .topbar .sub { color: var(--ink-3); font-size: 13px; margin-top: 1px; }
  .spacer { flex: 1; }
  .content { padding: clamp(16px,2.4vw,26px) clamp(16px,3vw,30px) 64px; }

  .btn { display: inline-flex; align-items: center; gap: 7px; background: var(--accent); color: #fff; border: 0; padding: 9px 15px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13.5px; box-shadow: var(--shadow); }
  .btn:hover { background: var(--accent-strong); }
  .btn svg { width: 16px; height: 16px; }
  .btn.ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--border-strong); box-shadow: none; }
  .btn.ghost:hover { background: var(--surface-2); border-color: var(--ink-3); }
  .btn.sm { padding: 6px 11px; font-size: 12.5px; }
  .btn.danger { background: var(--s-lost); }
  .btn.danger:hover { filter: brightness(1.08); }

  /* ---------- stat cards ---------- */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 17px; box-shadow: var(--shadow); }
  .stat .label { color: var(--ink-3); font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .stat .val { font-size: 27px; font-weight: 700; margin-top: 7px; font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .stat .val small { font-size: 14px; color: var(--ink-3); font-weight: 600; }

  .panels { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 900px){ .panels { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-head { display: flex; align-items: center; gap: 10px; padding: 15px 18px; border-bottom: 1px solid var(--border); }
  .card-head h3 { font-size: 14.5px; font-weight: 650; }
  .card-body { padding: 6px 8px; }

  /* ---------- table ---------- */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 12px; min-width: 240px; flex: 1; max-width: 380px; }
  .search input { border: 0; background: none; outline: none; color: var(--ink); width: 100%; }
  .search svg { width: 16px; height: 16px; color: var(--ink-3); flex: none; }
  select.filter { background: var(--surface); border: 1px solid var(--border-strong); color: var(--ink); border-radius: var(--radius-sm); padding: 8px 10px; font-weight: 500; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface-2); position: sticky; top: 0; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: 0; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--surface-2); }
  .cell-name { font-weight: 600; }
  .cell-sub { color: var(--ink-3); font-size: 12.5px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-strong); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex: none; }
  .with-avatar { display: flex; align-items: center; gap: 10px; }

  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .empty { text-align: center; padding: 54px 20px; color: var(--ink-3); }
  .empty svg { width: 40px; height: 40px; opacity: .4; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; color: var(--ink-2); margin-bottom: 6px; }

  /* ---------- pipeline ---------- */
  .board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; }
  .col { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); width: 264px; flex: none; display: flex; flex-direction: column; max-height: calc(100vh - 190px); }
  .col-head { display: flex; align-items: center; gap: 8px; padding: 12px 13px; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  .col-head .name { font-weight: 650; font-size: 13px; }
  .col-head .k { margin-left: auto; font-size: 11.5px; font-weight: 600; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .col-head .stripe { width: 8px; height: 8px; border-radius: 2px; }
  .col-sub { padding: 0 13px 10px; font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; font-weight: 600; }
  .col-body { padding: 10px; display: flex; flex-direction: column; gap: 9px; overflow-y: auto; flex: 1; min-height: 60px; }
  .col-body.drag-over { background: var(--accent-soft); border-radius: var(--radius-sm); }
  .lead-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; box-shadow: var(--shadow); cursor: grab; }
  .lead-card:active { cursor: grabbing; }
  .lead-card.dragging { opacity: .4; }
  .lead-card .lc-name { font-weight: 650; font-size: 13.5px; }
  .lead-card .lc-meta { color: var(--ink-3); font-size: 12px; margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .lead-card .lc-money { font-family: var(--mono); font-weight: 600; color: var(--accent-strong); font-size: 12.5px; }
  .lc-foot { display: flex; align-items: center; gap: 6px; margin-top: 9px; }
  .tag { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-2); }

  /* ---------- calendar ---------- */
  .cal-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .cal-head h2 { font-size: 18px; font-weight: 650; min-width: 190px; }
  .cal-nav { display: flex; gap: 6px; }
  .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink); display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-btn svg { width: 17px; height: 17px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .cal-dow { background: var(--surface-2); padding: 9px; text-align: center; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); }
  .cal-cell { background: var(--surface); min-height: 108px; padding: 7px 8px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
  .cal-cell:hover { background: var(--surface-2); }
  .cal-cell.other { background: var(--surface-2); }
  .cal-cell.other .cal-date { color: var(--ink-3); opacity: .5; }
  .cal-date { font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums; align-self: flex-start; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .cal-cell.today .cal-date { background: var(--accent); color: #fff; }
  .cal-evt { font-size: 11px; font-weight: 600; padding: 3px 6px; border-radius: 5px; background: var(--s-appointment-bg); color: var(--s-appointment); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-evt .t { font-variant-numeric: tabular-nums; opacity: .8; }

  /* ---------- week (time-grid) calendar ---------- */
  .cal-toggle { display: inline-flex; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); overflow: hidden; }
  .cal-toggle button { background: var(--surface); color: var(--ink-2); border: 0; padding: 7px 15px; font-weight: 600; font-size: 13px; }
  .cal-toggle button:hover { background: var(--surface-2); }
  .cal-toggle button.on { background: var(--accent); color: #fff; }
  .wk-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
  .wk-inner { min-width: 760px; }
  .wk-headrow { display: grid; grid-template-columns: 58px repeat(7, minmax(0,1fr)); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 3; }
  .wk-dayhead { text-align: center; padding: 9px 4px; border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .wk-dayhead .wk-dow { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); }
  .wk-dayhead .wk-dnum { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .wk-dayhead.today .wk-dnum { background: var(--accent); color: #fff; border-radius: 50%; }
  .wk-body { display: grid; grid-template-columns: 58px repeat(7, minmax(0,1fr)); }
  .wk-gutter { position: relative; }
  .wk-hour { position: absolute; right: 7px; transform: translateY(-7px); font-size: 10.5px; color: var(--ink-3); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .wk-col { position: relative; border-left: 1px solid var(--border); }
  .wk-col.today { background: var(--accent-soft); }
  .wk-line { position: absolute; left: 0; right: 0; height: 0; border-top: 1px solid var(--border); }
  .wk-evt { position: absolute; background: var(--s-appointment-bg); border: 1px solid var(--s-appointment); border-left: 3px solid var(--s-appointment); border-radius: 5px; padding: 3px 7px; overflow: hidden; cursor: pointer; box-sizing: border-box; }
  .wk-evt:hover { box-shadow: var(--shadow); z-index: 5; filter: brightness(1.04); }
  .wk-evt-t { font-size: 10px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--s-appointment); }
  .wk-evt-title { font-size: 12px; font-weight: 650; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wk-evt-sub { font-size: 10.5px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- import ---------- */
  .import-step { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-bottom: 18px; }
  .import-step h3 { font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; }
  .step-n { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: none; }
  .import-step p.hint { color: var(--ink-3); font-size: 13px; margin: 2px 0 14px 31px; }
  textarea.paste { width: 100%; min-height: 150px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 12px; background: var(--surface-2); color: var(--ink); font-family: var(--mono); font-size: 12.5px; resize: vertical; outline: none; }
  textarea.paste:focus { border-color: var(--accent); }
  .map-table { width: 100%; border-collapse: collapse; }
  .map-table td, .map-table th { padding: 9px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
  .map-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--ink-3); }
  .map-table .src { font-family: var(--mono); font-size: 12px; }
  .map-table select { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 6px; padding: 6px 8px; color: var(--ink); min-width: 190px; }
  .map-table .sample { color: var(--ink-3); font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preview-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }

  /* ---------- drawer ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(19,42,38,.4); backdrop-filter: blur(2px); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: min(940px, 96vw); max-width: 96vw; background: var(--surface); box-shadow: var(--shadow-lg); z-index: 51; transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .drawer.open { transform: translateX(0); }
  .drawer-head { padding: 20px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 13px; }
  .drawer-head .avatar { width: 44px; height: 44px; font-size: 16px; }
  .drawer-head h2 { font-size: 18px; font-weight: 650; }
  .drawer-head .close { margin-left: auto; background: none; border: 0; color: var(--ink-3); font-size: 24px; line-height: 1; padding: 0 4px; }
  .drawer-head .close:hover { color: var(--ink); }
  .drawer-body { overflow-y: auto; flex: 1; padding: 20px 22px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--ink-3); }
  .field input, .field select, .field textarea { border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 10px; background: var(--surface-2); color: var(--ink); outline: none; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: var(--surface); }
  .drawer-section { margin-top: 24px; }
  .drawer-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .drawer-section h4::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .tl-item { display: flex; gap: 11px; }
  .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex: none; position: relative; }
  .tl-item:not(:last-child) .tl-dot::after { content: ""; position: absolute; top: 12px; left: 4px; width: 1px; height: calc(100% + 8px); background: var(--border); }
  .tl-body { flex: 1; }
  .tl-text { font-size: 13px; }
  .tl-time { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
  .note-add { display: flex; gap: 8px; margin-bottom: 16px; }
  .note-add input { flex: 1; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 11px; background: var(--surface-2); color: var(--ink); outline: none; }
  .note-add input:focus { border-color: var(--accent); }
  .drawer-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .stage-select-wrap { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; padding: 4px 22px 15px; border-bottom: 1px solid var(--border); }

<script>
/* ========================= data model ========================= */
const STAGES = [
  { id: 'new',         label: 'New Lead',    color: 'var(--s-new)',        bg: 'var(--s-new-bg)' },
  { id: 'contacted',   label: 'Contacted',   color: 'var(--s-contacted)',  bg: 'var(--s-contacted-bg)' },
  { id: 'appointment', label: 'Appt Set',    color: 'var(--s-appointment)',bg: 'var(--s-appointment-bg)' },
  { id: 'quoted',      label: 'Quoted',      color: 'var(--s-quoted)',     bg: 'var(--s-quoted-bg)' },
  { id: 'application', label: 'Application', color: 'var(--s-application)', bg: 'var(--s-application-bg)' },
  { id: 'won',         label: 'Won',         color: 'var(--s-won)',        bg: 'var(--s-won-bg)' },
  { id: 'lost',        label: 'Lost',        color: 'var(--s-lost)',       bg: 'var(--s-lost-bg)' },
];
const stageById = id => STAGES.find(s => s.id === id) || STAGES[0];

const POLICY_TYPES = ['Term Life','Whole Life','IUL','Final Expense','Mortgage Protection','Universal Life','Annuity','Other'];

const FIELDS = [
  { key: 'firstName',      label: 'First Name' },
  { key: 'lastName',       label: 'Last Name' },
  { key: 'phone',          label: 'Phone' },
  { key: 'email',          label: 'Email' },
  { key: 'dob',            label: 'Date of Birth' },
  { key: 'age',            label: 'Age' },
  { key: 'gender',         label: 'Gender' },
  { key: 'address',        label: 'Address' },
  { key: 'city',           label: 'City' },
  { key: 'state',          label: 'State' },
  { key: 'zip',            label: 'Zip' },
  { key: 'leadSource',     label: 'Lead Source' },
  { key: 'policyType',     label: 'Policy Type' },
  { key: 'coverageAmount', label: 'Coverage Amount' },
  { key: 'premium',        label: 'Premium' },
  { key: 'beneficiary',    label: 'Beneficiary' },
  { key: 'notes',          label: 'Notes' },
];

// synonyms for auto-mapping CSV headers -> field keys
const SYNONYMS = {
  firstName: ['first name','firstname','fname','first','given name','givenname'],
  lastName:  ['last name','lastname','lname','last','surname','family name'],
  fullName:  ['name','full name','fullname','contact','contact name','lead name','client name','insured'],
  phone:     ['phone','mobile','cell','cell phone','phone number','telephone','tel','primary phone','number','contact number','phone1','mobile phone'],
  email:     ['email','e-mail','email address','emailaddress','mail'],
  dob:       ['dob','date of birth','birthdate','birth date','birthday','d.o.b','dateofbirth'],
  age:       ['age'],
  gender:    ['gender','sex','m/f','gender/sex'],
  address:   ['address','street','street address','address1','mailing address'],
  city:      ['city','town'],
  state:     ['state','st','province','region','state/province'],
  zip:       ['zip','zipcode','zip code','postal','postal code','postcode'],
  leadSource:['source','lead source','leadsource','campaign','origin','vendor','list','lead type'],
  policyType:['policy','policy type','policytype','product','coverage type','plan','product type','type of insurance'],
  coverageAmount:['coverage','coverage amount','face amount','face value','benefit','benefit amount','sum assured','coverageamount','desired coverage'],
  premium:   ['premium','monthly premium','monthly','payment','monthly payment','budget','premium amount'],
  beneficiary:['beneficiary','beneficiaries'],
  notes:     ['notes','note','comments','comment','remarks','description','memo','details'],
};

/* ========================= state / storage ========================= */
const KEY = 'keystone_crm_v1';
let state = load();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return { leads: [], appointments: [], brand: 'Keystone', theme: null, view: 'dashboard' };
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} scheduleCloudSave(); }
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ========================= Supabase cloud sync ========================= */
const SUPABASE_URL = 'https://fjdfosyozeuvingvodqi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZGZvc3lvemV1dmluZ3ZvZHFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MjU3NjIsImV4cCI6MjEwMDQwMTc2Mn0.f6vl1bm08ejIPAwo3gqCo3BECUYuNP_WJdWL5WVHm9c';
let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true } }); }
catch(e){ console.error('Supabase failed to initialize — running in local-only mode.', e); }
let currentUser = null;
let _cloudT = null;

function setSync(status){
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const map = {
    saved:   ['Saved to cloud','var(--s-won)'],
    pending: ['Saving…','var(--ink-3)'],
    offline: ['Offline — saved on device','var(--s-quoted)'],
  };
  const [txt,color] = map[status] || ['',''];
  el.innerHTML = txt ? `<span class="sync-dot" style="background:${color}"></span>${txt}` : '';
}
function scheduleCloudSave(){
  if (!currentUser || !sb) return;
  clearTimeout(_cloudT);
  setSync('pending');
  _cloudT = setTimeout(cloudSaveNow, 800);
}
async function cloudSaveNow(){
  if (!currentUser || !sb) return;
  try {
    const { error } = await sb.from('crm_state').upsert({ user_id: currentUser.id, data: state, updated_at: new Date().toISOString() });
    setSync(error ? 'offline' : 'saved');
    if (error) console.warn('Cloud save error:', error.message);
  } catch(e){ setSync('offline'); console.warn('Cloud save failed:', e); }
}
function normalizeState(s){
  s = s || {};
  return {
    leads: Array.isArray(s.leads) ? s.leads : [],
    appointments: Array.isArray(s.appointments) ? s.appointments : [],
    brand: s.brand || 'Keystone',
    theme: (s.theme === undefined ? null : s.theme),
    view: s.view || 'dashboard'
  };
}
async function loadCloud(){
  setSync('pending');
  try {
    const { data, error } = await sb.from('crm_state').select('data').eq('user_id', currentUser.id).maybeSingle();
    if (error) throw error;
    if (data && data.data){
      state = normalizeState(data.data);
    } else {
      // first sign-in for this account: seed the cloud from any local data, else start empty
      state = normalizeState(load());
      await cloudSaveNow();
    }
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
    setSync('saved');
  } catch(e){
    console.warn('Cloud load failed — using local cache.', e.message||e);
    state = normalizeState(load());
    setSync('offline');
  }
}

/* ========================= helpers ========================= */
const $ = sel => document.querySelector(sel);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fullName = l => [l.firstName, l.lastName].filter(Boolean).join(' ').trim() || '(no name)';
const initials = l => ((l.firstName||' ')[0] + (l.lastName||' ')[0]).toUpperCase().trim() || '?';
function money(v) {
  if (v == null || v === '') return '';
  const n = Number(String(v).replace(/[^0-9.\-]/g,''));
  if (isNaN(n) || n === 0) return String(v).match(/[0-9]/) ? '$'+Number(String(v).replace(/[^0-9.]/g,'')).toLocaleString() : v;
  return '$' + n.toLocaleString();
}
function relTime(ts){
  const d = (Date.now()-ts)/1000;
  if (d<60) return 'just now';
  if (d<3600) return Math.floor(d/60)+'m ago';
  if (d<86400) return Math.floor(d/3600)+'h ago';
  if (d<604800) return Math.floor(d/86400)+'d ago';
  return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2200);
}
function pill(stageId){
  const s = stageById(stageId);
  return `<span class="pill" style="background:${s.bg};color:${s.color}"><span class="dot" style="background:${s.color}"></span>${s.label}</span>`;
}

/* ========================= theme ========================= */
function applyTheme(){
  if (state.theme) document.documentElement.setAttribute('data-theme', state.theme);
  else document.documentElement.removeAttribute('data-theme');
}
$('#themeToggle').onclick = () => {
  const cur = state.theme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light');
  state.theme = cur === 'dark' ? 'light' : 'dark';
  save(); applyTheme();
};

/* ========================= nav ========================= */
const VIEWS = [
  { id:'dashboard', label:'Dashboard', icon:'M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 21h8v-6H3z' },
  { id:'leads',     label:'Clients',   icon:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75' },
  { id:'pipeline',  label:'Pipeline',  icon:'M3 3v18h18M8 17V9M13 17V5M18 17v-4' },
  { id:'calendar',  label:'Calendar',  icon:'M3 4h18v18H3zM3 10h18M8 2v4M16 2v4' },
  { id:'import',    label:'Import CSV',icon:'M12 3v12M8 11l4 4 4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2' },
];
function renderNav(){

/* ========================= calendar ========================= */
let calRef = new Date();
let calMode = 'week';
let _wkMinH = 8, _wkHH = 54;

function calStartOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
function calFmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function calToMin(t){ const m=/^(\d{1,2}):(\d{2})/.exec(t||''); return m ? (+m[1])*60 + (+m[2]) : 9*60; }
function calFmtHour(h){ const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0) hh=12; return `${hh} ${ap}`; }
function calFmtTime12(t){ const mn=calToMin(t); let h=Math.floor(mn/60), m=mn%60; const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0) hh=12; return `${hh}:${String(m).padStart(2,'0')} ${ap}`; }
function calLayoutDay(appts){
  const DUR=50;
  const evs = appts.map(a=>({ a, start:calToMin(a.time), end:calToMin(a.time)+DUR })).sort((x,y)=> x.start-y.start);
  let cols=[], group=[], groupEnd=-1; const res=[];
  const flush=()=>{ const n=cols.length; group.forEach(e=> res.push({ e, col:e._c, cols:n })); cols=[]; group=[]; };
  evs.forEach(e=>{
    if (group.length && e.start >= groupEnd) flush();
    let placed=false;
    for (let c=0;c<cols.length;c++){ if (cols[c][cols[c].length-1].end <= e.start){ cols[c].push(e); e._c=c; placed=true; break; } }
    if (!placed){ cols.push([e]); e._c=cols.length-1; }
    group.push(e); groupEnd=Math.max(groupEnd, e.end);
  });
  flush();
  return res;
}
function calHeadHtml(title){
  const nextLbl = calMode==='week' ? 'week' : 'month';
  return `
  <div class="cal-head">
    <h2>${title}</h2>
    <div class="cal-nav">
      <button class="icon-btn" id="calPrev" title="Previous ${nextLbl}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="icon-btn" id="calToday" style="width:auto;padding:0 12px;font-weight:600;font-size:13px;">Today</button>
      <button class="icon-btn" id="calNext" title="Next ${nextLbl}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="cal-toggle">
      <button class="${calMode==='week'?'on':''}" data-mode="week">Week</button>
      <button class="${calMode==='month'?'on':''}" data-mode="month">Month</button>
    </div>
    <div style="flex:1"></div>
    <button class="btn" id="newApptBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>New appointment</button>
  </div>`;
}
function viewCalendar(){ return calMode==='week' ? viewCalWeek() : viewCalMonth(); }

function viewCalWeek(){
  const ws = calStartOfWeek(calRef);
  const days = Array.from({length:7}, (_,i)=>{ const d=new Date(ws); d.setDate(ws.getDate()+i); return d; });
  const dayStrs = days.map(calFmtDate);
  const todayStr = calFmtDate(new Date());
  const weekAppts = state.appointments.filter(a=> dayStrs.includes(a.date));
  let minH=8, maxH=19;
  weekAppts.forEach(a=>{ const h=Math.floor(calToMin(a.time)/60); if(h<minH) minH=h; if(h+1>maxH) maxH=h+1; });
  minH=Math.max(0,minH); maxH=Math.min(24, Math.max(maxH, minH+6));
  _wkMinH=minH; _wkHH=54;
  const HH=54;
  const hours=[]; for(let h=minH;h<maxH;h++) hours.push(h);
  const bodyH=(maxH-minH)*HH;
  const dowShort=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const label = (()=>{ const a=days[0], b=days[6];
    const mA=a.toLocaleDateString(undefined,{month:'short'}), mB=b.toLocaleDateString(undefined,{month:'short'});
    return a.getMonth()===b.getMonth()
      ? `${mA} ${a.getDate()} – ${b.getDate()}, ${b.getFullYear()}`
      : `${mA} ${a.getDate()} – ${mB} ${b.getDate()}, ${b.getFullYear()}`;
  })();

  const colHtml = days.map((d,di)=>{
    const ds=dayStrs[di];
    const laid=calLayoutDay(weekAppts.filter(a=>a.date===ds));
    const evHtml=laid.map(({e,col,cols})=>{
      const a=e.a; const l=state.leads.find(x=>x.id===a.leadId);
      const top=((e.start - minH*60)/60)*HH;
      const height=Math.max(26, ((e.end-e.start)/60)*HH - 3);
      const w=100/cols, left=col*w;
      return `<div class="wk-evt" data-appt="${a.id}" style="top:${top}px;height:${height}px;left:calc(${left}% + 2px);width:calc(${w}% - 4px);">
        <div class="wk-evt-t">${calFmtTime12(a.time)}</div>
        <div class="wk-evt-title">${esc(l?fullName(l):(a.title||'Appointment'))}</div>
        ${l&&a.title?`<div class="wk-evt-sub">${esc(a.title)}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="wk-col ${ds===todayStr?'today':''}" data-date="${ds}" style="height:${bodyH}px">
      ${hours.map((h,hi)=>`<div class="wk-line" style="top:${hi*HH}px"></div>`).join('')}
      ${evHtml}
    </div>`;
  }).join('');

  return calHeadHtml(label) + `
  <div class="wk-wrap">
    <div class="wk-inner">
      <div class="wk-headrow">
        <div class="wk-gutter-h"></div>
        ${days.map((d,di)=>`<div class="wk-dayhead ${dayStrs[di]===todayStr?'today':''}"><span class="wk-dow">${dowShort[d.getDay()]}</span><span class="wk-dnum">${d.getDate()}</span></div>`).join('')}
      </div>
      <div class="wk-body">

function viewCalMonth(){
  const y = calRef.getFullYear(), m = calRef.getMonth();
  const first = new Date(y,m,1); const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);
  const cells = [];
  for (let i=startDow-1;i>=0;i--) cells.push({ d:prevDays-i, other:true, mo:m-1 });
  for (let d=1;d<=daysInMonth;d++) cells.push({ d, other:false, mo:m });
  while (cells.length % 7 !== 0 || cells.length < 42) { const last = cells[cells.length-1]; cells.push({ d:(last.other?last.d:0)+1, other:true, mo:m+1 }); if (cells.length>=42) break; }

  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthName = calRef.toLocaleDateString(undefined,{month:'long',year:'numeric'});

  const cellHtml = cells.map(c=>{
    const cy = c.mo<0?y-1:c.mo>11?y+1:y;
    const cm = (c.mo+12)%12;
    const dateStr = `${cy}-${String(cm+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`;
    const evts = state.appointments.filter(a=>a.date===dateStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    return `<div class="cal-cell ${c.other?'other':''} ${dateStr===todayStr?'today':''}" data-date="${dateStr}">
      <span class="cal-date">${c.d}</span>
      ${evts.slice(0,3).map(a=>{ const l=state.leads.find(x=>x.id===a.leadId);
        return `<div class="cal-evt" title="${esc(a.title)}" data-appt="${a.id}"><span class="t">${calFmtTime12(a.time)}</span> ${esc(l?fullName(l):a.title)}</div>`; }).join('')}
      ${evts.length>3?`<div class="cell-sub" style="font-size:10.5px;padding-left:4px;">+${evts.length-3} more</div>`:''}
    </div>`;
  }).join('');

  return calHeadHtml(monthName) + `
  <div class="cal-grid">
    ${dow.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
    ${cellHtml}
  </div>`;
}

  if (next) next.onclick = ()=>{ if(calMode==='week') calRef.setDate(calRef.getDate()+7); else calRef.setMonth(calRef.getMonth()+1); render(); };

// robust delimiter-aware line splitter (handles quotes)
function splitLine(line, delim){
  const out = []; let cur=''; let q=false;
  for (let i=0;i<line.length;i++){
    const ch = line[i];
    if (q){
      if (ch==='"'){ if (line[i+1]==='"'){ cur+='"'; i++; } else q=false; }
      else cur+=ch;
    } else {
      if (ch==='"') q=true;
      else if (ch===delim){ out.push(cur); cur=''; }
      else cur+=ch;
    }
  }
  out.push(cur); return out.map(s=>s.trim());
}
function detectDelim(text){
  const line = text.split(/\r?\n/)[0]||'';
  const tabs = (line.match(/\t/g)||[]).length;
  const commas = (line.match(/,/g)||[]).length;
  const semis = (line.match(/;/g)||[]).length;
  if (tabs >= commas && tabs >= semis && tabs>0) return '\t';
  if (semis > commas) return ';';
  return ',';
}
function looksLikeHeader(cells){
  // header if no cell is purely numeric and cells are short-ish words
  const numeric = cells.filter(c=> c!=='' && !isNaN(Number(c.replace(/[$,]/g,'')))).length;
  const hasEmail = cells.some(c=>/@/.test(c));
  return numeric === 0 && !hasEmail;
}
function normalize(s){ return s.toLowerCase().replace(/[_\-.]/g,' ').replace(/\s+/g,' ').trim(); }
function containsSeq(arr, seq){
  if (seq.length > arr.length) return false;
  for (let i=0; i<=arr.length-seq.length; i++){
    let ok=true;
    for (let j=0; j<seq.length; j++){ if (arr[i+j]!==seq[j]){ ok=false; break; } }
    if (ok) return true;
  }
  return false;
}
function guessField(header){
  const h = normalize(header);
  const htok = h.split(' ').filter(Boolean);
  // 1) exact phrase match against a known synonym
  for (const [key, syns] of Object.entries(SYNONYMS)){
    if (syns.includes(h)) return key;
  }
  // 2) token-aware match (avoids false positives like "best time" -> "st")
  for (const [key, syns] of Object.entries(SYNONYMS)){
    for (const s of syns){
      const stok = s.split(' ').filter(Boolean);
      if (stok.length === 1){
        // single-word synonym only matches a single-word header (exact token)
        if (htok.length === 1 && htok[0] === stok[0]) return key;
      } else {
        // multi-word synonym matches if it appears as consecutive words in the header
        if (containsSeq(htok, stok)) return key;
      }
    }
  }
  return '';
}
function doParse(){
  const text = $('#pasteBox').value.trim();
  if (!text){ toast('Paste some rows first'); return; }
  const delim = detectDelim(text);
  const lines = text.split(/\r?\n/).filter(l=>l.trim()!=='');
  let rows = lines.map(l=> splitLine(l, delim));
  const width = Math.max(...rows.map(r=>r.length));
  rows = rows.map(r=>{ while(r.length<width) r.push(''); return r; });

  const hasHeader = looksLikeHeader(rows[0]);
  let headers, dataRows;
  if (hasHeader){ headers = rows[0]; dataRows = rows.slice(1); }
  else { headers = rows[0].map((_,i)=>`Column ${i+1}`); dataRows = rows; }

  const mapping = headers.map(h=> hasHeader ? (guessField(h) || '__note__') : '');
  importParsed = { headers, rows: dataRows, mapping, hasHeader };
  renderMapStep();
}
function renderMapStep(){
  const { headers, rows, mapping } = importParsed;
  const mapped = mapping.filter(m=> m && m!=='__note__').length;
  const toNotes = mapping.filter(m=> m==='__note__').length;
  const options = `<option value="">&mdash; Skip this column &mdash;</option>` +

    <p class="hint">${mapped} of ${headers.length} columns matched to fields${toNotes?`, ${toNotes} added to Notes so nothing is lost`:''}. Fix any that look off, or set a column to Skip to drop it.</p>
    <div style="overflow-x:auto;"><table class="map-table">
      <thead><tr><th>Your column</th><th>Sample data</th><th>Maps to</th></tr></thead>
      <tbody>${headers.map((h,i)=>`<tr>

        <td><select data-col="${i}">${options.replace(`value="${mapping[i]}"`,`value="${mapping[i]}" selected`)}</select></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>
  <div class="import-step">
    <h3><span class="step-n">3</span> Review & import</h3>
    <p class="hint" id="importSummary"></p>
    <div class="preview-wrap" id="previewWrap"></div>
    <div style="margin-top:16px;display:flex;gap:10px;align-items:center;">
      <button class="btn" id="doImport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>Import <span id="importN"></span> leads</button>
      <label style="display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2);cursor:pointer;"><input type="checkbox" id="dedupe" checked> Skip duplicates (same phone or email)</label>
    </div>
  </div>`;
  el.querySelectorAll('select[data-col]').forEach(sel=> sel.onchange = e=>{
    importParsed.mapping[Number(e.target.dataset.col)] = e.target.value; renderPreview();
  });
  $('#doImport').onclick = commitImport;
  renderPreview();
}
function buildLeadsFromImport(){
  const { headers, rows, mapping } = importParsed;
  return rows.map(r=>{
    const lead = { id:uid(), stage:'new', createdAt:Date.now(), activity:[{ts:Date.now(),text:'Imported from CSV',type:'system'}] };
    mapping.forEach((field,i)=>{
      if (!field) return;
      const val = (r[i]||'').trim(); if (!val) return;
      if (field==='fullName'){
        const parts = val.split(/\s+/);
        lead.firstName = parts.shift()||''; lead.lastName = parts.join(' ');
      } else if (field==='notes' || field==='__note__'){
        const line = (field==='__note__') ? `${headers[i]}: ${val}` : val;
        lead.notes = (lead.notes ? lead.notes+'\n' : '') + line;
      } else lead[field] = val;
    });
    return lead;
  }).filter(l=> l.firstName || l.lastName || l.phone || l.email);
}
function renderPreview(){
  const leads = buildLeadsFromImport();

}
function commitImport(){
  let leads = buildLeadsFromImport();
  if (leads.length===0){ toast('No valid leads to import'); return; }
  if ($('#dedupe').checked){
    const seen = new Set(state.leads.map(l=> (l.phone||'').replace(/\D/g,'') || (l.email||'').toLowerCase()).filter(Boolean));
    const before = leads.length;
    leads = leads.filter(l=>{
      const k = (l.phone||'').replace(/\D/g,'') || (l.email||'').toLowerCase();
      if (k && seen.has(k)) return false;
      if (k) seen.add(k);
      return true;
    });
    var skipped = before - leads.length;
  }
  state.leads = leads.concat(state.leads);
  save();
  $('#pasteBox') && ($('#pasteBox').value='');
  importParsed = null;
  toast(`Imported ${leads.length} lead${leads.length!==1?'s':''}${skipped?`, skipped ${skipped} dup${skipped!==1?'s':''}`:''}`);
  go('leads');
}

  d.querySelectorAll('.appt-row').forEach(r=> r.onclick = ()=>{ const a=state.appointments.find(x=>x.id===r.dataset.appt); if(a) apptModal(a); });

  // follow-up quick-set buttons
  d.querySelectorAll('.fu-quick button').forEach(b=> b.onclick = ()=>{
    const days = Number(b.dataset.fu);
    const inp = d.querySelector('[data-f="followUpDate"]');
    if (days===0){ inp.value=''; }
    else { const dt=new Date(); dt.setDate(dt.getDate()+days); inp.value=dt.toISOString().slice(0,10); }
    inp.dispatchEvent(new Event('input',{bubbles:true}));
  });

  // stage buttons
  d.querySelectorAll('.stage-btn').forEach(b=> b.onclick = ()=>{
    const st = b.dataset.stage; if (lead.stage===st) return;
    lead.stage = st; lead.activity = lead.activity||[]; lead.activity.unshift({ts:Date.now(),text:`Stage &rarr; <b>${stageById(st).label}</b>`,type:'stage'});
    save(); renderDrawer(lead);
  });

  // disposition quick-log
  d.querySelectorAll('.dispo').forEach(b=> b.onclick = ()=>{
    lead.activity = lead.activity||[]; lead.activity.unshift({ts:Date.now(),text:`Call: ${esc(b.dataset.dispo)}`,type:'note'});
    if (lead.stage==='new') lead.stage='contacted';
    save(); $('#timeline').innerHTML=renderTimeline(lead);
    d.querySelectorAll('.stage-btn').forEach(x=>{ const on=x.dataset.stage===lead.stage; x.classList.toggle('on',on); x.style.background = on? stageById(lead.stage).color : ''; });
    toast(b.dataset.dispo);
  });

  // scratch autosave + log
  const scratch = $('#scratch');
  scratch.addEventListener('input', debounce(()=>{ lead.scratch = scratch.value; save(); }, 350));
  $('#logNote').onclick = ()=>{
    const v = scratch.value.trim(); if(!v){ toast('Nothing to log yet'); return; }
    lead.activity = lead.activity||[]; lead.activity.unshift({ts:Date.now(),text:esc(v),type:'note'});
    lead.scratch=''; scratch.value=''; save(); $('#timeline').innerHTML=renderTimeline(lead); toast('Logged to timeline');
  };

  // field autosave &mdash; nothing is ever lost
  const saveFields = debounce(()=>{ d.querySelectorAll('[data-f]').forEach(inp=> lead[inp.dataset.f] = (inp.value||'').trim()); save(); }, 350);
  d.querySelectorAll('[data-f]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      saveFields();
      if (inp.dataset.f==='firstName' || inp.dataset.f==='lastName'){
        const fn=d.querySelector('[data-f="firstName"]').value, ln=d.querySelector('[data-f="lastName"]').value;
        $('#dName').textContent = [fn,ln].filter(Boolean).join(' ') || '(no name)';
      }
    });
    inp.addEventListener('change', saveFields);
  });

  // delete (in-app confirm &mdash; native confirm() is blocked in the sandbox)
  $('#delLead').onclick = ()=> confirmDialog('Delete client?', `This permanently removes <b>${esc(fullName(lead))}</b> and any appointments. This can't be undone.`, ()=>{
    state.leads = state.leads.filter(l=>l.id!==lead.id);
    state.appointments = state.appointments.filter(a=>a.leadId!==lead.id);
    save(); openLeadId=null;
    $('#overlay').classList.remove('open'); $('#drawer').classList.remove('open');
    render(); toast('Client deleted');
  });
}
function renderTimeline(lead){
  const acts = lead.activity||[];
  if (!acts.length) return '<div class="cell-sub">No activity yet.</div>';
  return acts.map(a=>`<div class="tl-item"><div class="tl-dot" style="background:${a.type==='stage'?'var(--s-appointment)':a.type==='system'?'var(--ink-3)':'var(--accent)'}"></div>
    <div class="tl-body"><div class="tl-text">${a.text}</div><div class="tl-time">${relTime(a.ts)}</div></div></div>`).join('');
}

/* ========================= modal / confirm ========================= */
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
function openModal(title, body, foot){ $('#modalTitle').textContent=title; $('#modalBody').innerHTML=body; $('#modalFoot').innerHTML=foot; $('#modal').classList.add('open'); }
function closeModal(){ $('#modal').classList.remove('open'); }
function confirmDialog(title, msg, onYes, yesLabel='Delete', danger=true){
  openModal(title, `<p style="margin:0;color:var(--ink-2);line-height:1.55;">${msg}</p>`,
    `<button class="btn ghost" onclick="closeModal()">Cancel</button>
     <button class="btn ${danger?'danger':''}" id="confirmYes">${yesLabel}</button>`);
  $('#confirmYes').onclick = ()=>{ closeModal(); onYes(); };
}
function apptModal(appt, presetDate, presetLeadId, presetTime){
  const isNew = !appt;
  const a = appt || { id:uid(), date:presetDate||new Date().toISOString().slice(0,10), time:presetTime||'10:00', title:'', leadId:presetLeadId||'', notes:'' };
  const leadOpts = `<option value="">&mdash; No client &mdash;</option>` + state.leads.slice().sort((x,y)=>fullName(x).localeCompare(fullName(y))).map(l=>`<option value="${l.id}" ${a.leadId===l.id?'selected':''}>${esc(fullName(l))}</option>`).join('');
  openModal(isNew?'New appointment':'Edit appointment', `
    <div class="field-grid">
      <div class="field full"><label>Title</label><input id="aTitle" value="${esc(a.title)}" placeholder="e.g. Policy review call"></div>
      <div class="field"><label>Date</label><input id="aDate" type="date" value="${a.date}"></div>
      <div class="field"><label>Time</label><input id="aTime" type="time" value="${a.time}"></div>
      <div class="field full"><label>Client</label><select id="aLead">${leadOpts}</select></div>
      <div class="field full"><label>Notes</label><textarea id="aNotes" rows="2" style="border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 10px;background:var(--surface-2);color:var(--ink);outline:none;">${esc(a.notes)}</textarea></div>
    </div>`,
    `${!isNew?'<button class="btn danger" id="aDel" style="margin-right:auto;">Delete</button>':''}
     <button class="btn ghost" onclick="closeModal()">Cancel</button>
     <button class="btn" id="aSave">${isNew?'Add appointment':'Save'}</button>`);
  $('#aSave').onclick = ()=>{
    a.title=$('#aTitle').value.trim()||'Appointment'; a.date=$('#aDate').value; a.time=$('#aTime').value; a.leadId=$('#aLead').value; a.notes=$('#aNotes').value.trim();
    if (isNew) state.appointments.push(a);
    // reflect on lead + stage bump
    if (a.leadId){ const l=state.leads.find(x=>x.id===a.leadId); if(l){ l.activity=l.activity||[]; l.activity.unshift({ts:Date.now(),text:`Appointment set for ${a.date} ${a.time}`,type:'stage'}); if(l.stage==='new'||l.stage==='contacted') l.stage='appointment'; } }
    save(); closeModal(); toast(isNew?'Appointment added':'Appointment saved');
    if (openLeadId){ const l=state.leads.find(x=>x.id===openLeadId); if(l) renderDrawer(l); }
    render();
  };
  const del = $('#aDel'); if (del) del.onclick = ()=>{ state.appointments = state.appointments.filter(x=>x.id!==a.id); save(); closeModal(); toast('Appointment deleted'); if(openLeadId){const l=state.leads.find(x=>x.id===openLeadId);if(l)renderDrawer(l);} render(); };
}

/* ========================= brand + top actions ========================= */
$('#brandName').textContent = state.brand || 'Keystone';
$('#brandName').addEventListener('blur', ()=>{ state.brand = $('#brandName').textContent.trim()||'Keystone'; document.title = state.brand+' - Life Insurance CRM'; save(); });
$('#brandName').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#brandName').blur(); } });
$('#addLeadBtn').onclick = ()=> openLead();
$('#menuToggle').onclick = ()=> $('#sidebar').classList.toggle('open');

/* ========================= backup / restore ========================= */
$('#exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(state.brand||'keystone').toLowerCase().replace(/\s+/g,'-')}-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Backup downloaded');
};
$('#restoreBtn').onclick = ()=> $('#restoreFile').click();
$('#restoreFile').onchange = e=>{
  const file = e.target.files[0]; if(!file){ return; }
  const reader = new FileReader();
  reader.onload = ()=>{
    let data; try { data = JSON.parse(reader.result); } catch(err){ data = null; }
    if (!data || !Array.isArray(data.leads)){ toast("That doesn't look like a Keystone backup"); e.target.value=''; return; }
    confirmDialog('Restore this backup?', `This replaces your current data with the backup (<b>${data.leads.length}</b> clients, <b>${(data.appointments||[]).length}</b> appointments). Export a backup first if you're unsure.`, ()=>{
      state = Object.assign({ leads:[], appointments:[], brand:'Keystone', theme:state.theme, view:'dashboard' }, data);
      state.theme = state.theme || null;
      save(); applyTheme();
      $('#brandName').textContent = state.brand||'Keystone';
      document.title = (state.brand||'Keystone') + ' - Life Insurance CRM';
      render(); toast('Backup restored');
    }, 'Restore', false);
    e.target.value='';
  };
  reader.readAsText(file);
};

  else loadSample();

/* ========================= boot + auth ========================= */
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); if($('#drawer').classList.contains('open')) closeDrawer(); } });

const authScreen = document.getElementById('authScreen');
let authMode = 'signin';
function showAuth(){ authScreen.classList.add('open'); }
function hideAuth(){ authScreen.classList.remove('open'); }
function authError(msg){ const e=document.getElementById('authError'); e.textContent=msg||''; e.style.display = msg?'block':'none'; }
function setAuthMode(m){
  authMode = m;
  document.getElementById('authTitle').textContent = m==='signup' ? 'Create your account' : 'Welcome back';
  document.getElementById('authSubmit').textContent = m==='signup' ? 'Create account' : 'Sign in';
  document.getElementById('authToggleText').innerHTML = m==='signup'
    ? 'Already have an account? <a href="#" id="authToggle">Sign in</a>'
    : 'First time here? <a href="#" id="authToggle">Create an account</a>';
  document.getElementById('authToggle').onclick = ev=>{ ev.preventDefault(); setAuthMode(m==='signup'?'signin':'signup'); };
  authError('');
}
async function submitAuth(){
  if (!sb){ authError('Cloud is unavailable right now. Try again in a moment.'); return; }
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password){ authError('Enter your email and password.'); return; }
  if (authMode==='signup' && password.length < 6){ authError('Use a password of at least 6 characters.'); return; }
  const btn = document.getElementById('authSubmit'); btn.disabled=true; const orig=btn.textContent; btn.textContent='Please wait…';
  try {
    if (authMode==='signup'){
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (!data.session){ authError('Account created — check your email to confirm, then sign in.'); setAuthMode('signin'); }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }
  } catch(e){ authError(e.message || 'Something went wrong. Please try again.'); }
  finally { btn.disabled=false; btn.textContent=orig; }
}
async function onSignedIn(user){
  if (currentUser && currentUser.id === user.id) return;
  currentUser = user;
  const em = document.getElementById('userEmail'); if (em) em.textContent = user.email || '';
  hideAuth();
  await loadCloud();
  applyTheme();
  document.title = (state.brand||'Keystone') + ' - Life Insurance CRM';
  if (!state.view) state.view='dashboard';
  render();
}
function onSignedOut(){
  currentUser = null;
  try { localStorage.removeItem(KEY); } catch(e){}
  state = normalizeState(null);
  setSync('');
  showAuth(); setAuthMode('signin');
  document.getElementById('authEmail').value=''; document.getElementById('authPassword').value='';
}

document.getElementById('authSubmit').onclick = submitAuth;
document.getElementById('authPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAuth(); });
document.getElementById('authEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('authPassword').focus(); });
document.getElementById('signOutBtn').onclick = ()=>{ if(sb) sb.auth.signOut(); };
setAuthMode('signin');

if (sb){
  sb.auth.onAuthStateChange((event, session)=>{
    if ((event==='SIGNED_IN' || event==='INITIAL_SESSION' || event==='TOKEN_REFRESHED') && session && session.user){ onSignedIn(session.user); }
    else if (event==='SIGNED_OUT'){ onSignedOut(); }
  });
  (async ()=>{
    try {
      const { data:{ session } } = await sb.auth.getSession();
      if (session && session.user) onSignedIn(session.user); else showAuth();
    } catch(e){ showAuth(); }
  })();
} else {
  // Cloud library unavailable — fall back to local-only so the app still works
  hideAuth(); applyTheme();
  document.title = (state.brand||'Keystone') + ' - Life Insurance CRM';
  if (!state.view) state.view='dashboard';
  render();
}
</script>
